<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Profil — CamServices</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="nav"></div>
    <hr>

    <h1>Mon Profil Prestataire</h1>

    <!-- Infos utilisateur -->
    <div id="profile-info">Chargement...</div>

    <hr>

    <!-- Upload CNI -->
    <h2>Vérification d'identité (CNI)</h2>
    <div id="cni-section">
        <p>Uploadez votre carte nationale d'identité pour validation par l'admin.</p>
        <input type="file" id="cni-file" accept="image/*,.pdf">
        <button id="btn-upload-cni">Envoyer la CNI</button>
        <p id="cni-message"></p>
        <div id="cni-status"></div>
    </div>

    <hr>
    <!-- Formulaire création de service -->
    <h2>Ajouter un nouveau service</h2>
    <div id="service-form">
        <label for="svc-title">Titre du service :</label><br>
        <input type="text" id="svc-title" placeholder="Ex: Plomberie à domicile"><br><br>

        <label for="svc-description">Description :</label><br>
        <textarea id="svc-description" rows="5" cols="50" placeholder="Décrivez votre service en détail..."></textarea><br><br>

        <label for="svc-price">Prix (FCFA) :</label><br>
        <input type="number" id="svc-price" placeholder="Ex: 15000"><br><br>

        <label for="svc-images">Images du service (optionnel) :</label><br>
        <input type="file" id="svc-images" accept="image/*" multiple><br><br>

        <button id="btn-add-service">Publier le service</button>
        <p id="service-message"></p>
    </div>

    <hr>

    <!-- Liste des services du prestataire -->
    <h2>Mes services</h2>
    <div id="my-services">Chargement...</div>

    <script src="config.js"></script>
    <script>
        renderNav();

        let currentUser = null;

        /**
         * Initialisation de la page profil
         */
        async function initProfile() {
            // Vérifier que l'utilisateur est un prestataire connecté
            currentUser = await requireAuth(['prestataire']);
            if (!currentUser) return;

            displayProfileInfo();
            loadCniStatus();
            loadMyServices();
        }

        /**
         * Affiche les infos du profil
         */
        function displayProfileInfo() {
            const container = document.getElementById('profile-info');
            const statusLabel = {
                'pending': 'En attente de vérification',
                'verified': 'Vérifié',
                'blocked': 'Bloqué'
            };

            let html = '';
            html += '<p><strong>Nom :</strong> ' + currentUser.full_name + '</p>';
            html += '<p><strong>Email :</strong> ' + currentUser.email + '</p>';
            html += '<p><strong>Téléphone :</strong> ' + currentUser.phone + '</p>';
            html += '<p><strong>Ville :</strong> ' + currentUser.city + '</p>';
            html += '<p><strong>Statut :</strong> ' + (statusLabel[currentUser.status] || currentUser.status) + '</p>';
            container.innerHTML = html;
        }

        /**
         * Charge le statut de la CNI
         */
        async function loadCniStatus() {
            const container = document.getElementById('cni-status');

            const { data, error } = await supabase
                .from('documents')
                .select('*')
                .eq('user_id', currentUser.id)
                .order('created_at', { ascending: false })
                .limit(1);

            if (error || !data || data.length === 0) {
                container.innerHTML = '<p>Aucune CNI soumise.</p>';
                return;
            }

            const doc = data[0];
            const statusLabel = {
                'pending': 'En cours de vérification',
                'verified': 'Approuvée',
                'rejected': 'Refusée'
            };

            container.innerHTML = '<p><strong>Statut CNI :</strong> ' +
                (statusLabel[doc.verification_status] || doc.verification_status) + '</p>';
        }

        /**
         * Upload de la CNI vers Supabase Storage
         */
        document.getElementById('btn-upload-cni').addEventListener('click', async () => {
            const fileInput = document.getElementById('cni-file');
            const messageEl = document.getElementById('cni-message');

            if (!fileInput.files || fileInput.files.length === 0) {
                messageEl.textContent = 'Veuillez sélectionner un fichier.';
                return;
            }

            const file = fileInput.files[0];
            const fileName = currentUser.id + '_cni_' + Date.now() + '_' + file.name;

            messageEl.textContent = 'Upload en cours...';

            // Upload vers Supabase Storage (bucket "documents")
            const { data: uploadData, error: uploadError } = await supabase.storage
                .from('documents')
                .upload(fileName, file);

            if (uploadError) {
                messageEl.textContent = 'Erreur upload : ' + uploadError.message;
                return;
            }

            // Obtenir l'URL publique
            const { data: urlData } = supabase.storage
                .from('documents')
                .getPublicUrl(fileName);

            const cniUrl = urlData.publicUrl;

            // Insérer dans la table documents
            const { error: dbError } = await supabase
                .from('documents')
                .insert({
                    user_id: currentUser.id,
                    cni_url: cniUrl,
                    verification_status: 'pending'
                });

            if (dbError) {
                messageEl.textContent = 'Erreur enregistrement : ' + dbError.message;
                return;
            }

            messageEl.textContent = 'CNI envoyée avec succès ! En attente de vérification.';
            loadCniStatus();
        });

        /**
         * Ajouter un nouveau service
         */
        document.getElementById('btn-add-service').addEventListener('click', async () => {
            const title = document.getElementById('svc-title').value.trim();
            const description = document.getElementById('svc-description').value.trim();
            const price = parseFloat(document.getElementById('svc-price').value);
            const messageEl = document.getElementById('service-message');

            if (!title || !description || !price || price <= 0) {
                messageEl.textContent = 'Veuillez remplir tous les champs correctement.';
                return;
            }

            // Vérifier que le prestataire est vérifié
            if (currentUser.status !== 'verified') {
                messageEl.textContent = 'Vous devez être vérifié pour publier un service. Soumettez votre CNI.';
                return;
            }

            messageEl.textContent = 'Publication en cours...';

            // Upload des images si présentes
            let imageUrls = [];
            const imagesInput = document.getElementById('svc-images');
            if (imagesInput.files && imagesInput.files.length > 0) {
                for (let i = 0; i < imagesInput.files.length; i++) {
                    const file = imagesInput.files[i];
                    const fileName = currentUser.id + '_svc_' + Date.now() + '_' + file.name;

                    const { data: upData, error: upError } = await supabase.storage
                        .from('services')
                        .upload(fileName, file);

                    if (!upError) {
                        const { data: urlData } = supabase.storage
                            .from('services')
                            .getPublicUrl(fileName);
                        imageUrls.push(urlData.publicUrl);
                    }
                }
            }

            // Insérer le service
            const { error } = await supabase
                .from('services')
                .insert({
                    user_id: currentUser.id,
                    title: title,
                    description: description,
                    price: price,
                    images: imageUrls
                });

            if (error) {
                messageEl.textContent = 'Erreur : ' + error.message;
                return;
            }

            messageEl.textContent = 'Service publié avec succès !';
            // Vider le formulaire
            document.getElementById('svc-title').value = '';
            document.getElementById('svc-description').value = '';
            document.getElementById('svc-price').value = '';
            imagesInput.value = '';

            loadMyServices();
        });

        /**
         * Charge la liste des services du prestataire
         */
        async function loadMyServices() {
            const container = document.getElementById('my-services');

            const { data, error } = await supabase
                .from('services')
                .select('*')
                .eq('user_id', currentUser.id)
                .order('created_at', { ascending: false });

            if (error) {
                container.innerHTML = '<p>Erreur : ' + error.message + '</p>';
                return;
            }

            if (!data || data.length === 0) {
                container.innerHTML = '<p>Vous n\'avez aucun service publié.</p>';
                return;
            }

            let html = '';
            data.forEach(service => {
                html += '<div>';
                html += '<h3>' + service.title + '</h3>';
                html += '<p>' + service.description + '</p>';
                html += '<p><strong>Prix :</strong> ' + formatPrice(service.price) + '</p>';
                html += '<a href="service.html?id=' + service.id + '"><button>Voir</button></a>';
                html += '</div><hr>';
            });

            container.innerHTML = html;
        }

        initProfile();
    </script>
</body>
</html>
