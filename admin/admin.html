<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Administration — CamServices</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
   <style>
    :root {
        --primary: #22C55E; --primary-hover: #16A34A; --primary-light: #F0FDF4; --primary-dim: rgba(34,197,94,.08);
        --text-primary: #111827; --text-secondary: #4B5563; --text-muted: #6B7280;
        --bg: #FFFFFF; --surface: #F9FAFB; --border: #E5E7EB; --border-light: #F3F4F6;
        --accent: #F59E0B; --accent-light: #FFFBEB; --error: #EF4444; --error-light: #FEF2F2;
        --blue: #3B82F6; --blue-light: #EFF6FF; --purple: #7C3AED; --purple-light: #F5F3FF;
        --shadow: 0 4px 20px rgba(0,0,0,.06); --shadow-lg: 0 12px 40px rgba(0,0,0,.1);
        --radius-sm: 8px; --radius: 12px; --radius-lg: 16px; --radius-xl: 20px;
        --sidebar-w: 240px; --max: 1400px;
        --bottom-nav-h: 72px;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--surface);
        color: var(--text-primary);
        display: flex;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
    }

    ::selection { background: var(--primary-dim); color: var(--text-primary); }

    /* ═══ ANIMATIONS ═══ */
    @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes spin { to { transform:rotate(360deg); } }
    @keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:.5; } }
    @keyframes slideUpBottom { from { transform:translateY(100%); } to { transform:translateY(0); } }
    @keyframes slideUpModal { from { opacity:0; transform:translateY(30px) scale(.97); } to { opacity:1; transform:translateY(0) scale(1); } }
    @keyframes slideUpMobile { from { opacity:0; transform:translateY(60px); } to { opacity:1; transform:translateY(0); } }
    @keyframes toastIn { from { opacity:0; transform:translateX(40px); } to { opacity:1; transform:translateX(0); } }
    @keyframes toastOut { from { opacity:1; transform:translateX(0); } to { opacity:0; transform:translateX(40px); } }
    @keyframes slideInLeft { from { transform:translateX(-100%); } to { transform:translateX(0); } }

    /* ═══ SIDEBAR (Desktop) ═══ */
    .sidebar {
        width: var(--sidebar-w);
        background: var(--bg);
        border-right: 1px solid var(--border-light);
        display: flex;
        flex-direction: column;
        position: fixed;
        top: 0; left: 0; bottom: 0;
        z-index: 100;
        padding: 20px 14px;
        overflow-y: auto;
    }

    .sidebar-logo {
        font-weight: 800;
        font-size: 1rem;
        color: var(--text-primary);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 28px;
        padding: 0 8px;
    }

    .sidebar-logo span { color: var(--primary); }

    .sidebar-nav { list-style: none; flex: 1; }

    .sidebar-nav a {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: var(--radius-sm);
        font-size: .8125rem;
        font-weight: 500;
        color: var(--text-secondary);
        text-decoration: none;
        transition: all .2s;
        margin-bottom: 2px;
    }

    .sidebar-nav a:hover { background: var(--surface); color: var(--text-primary); }

    .sidebar-nav a.active {
        background: var(--primary-dim);
        color: var(--primary);
        font-weight: 600;
    }

    .sidebar-nav a i { width: 1rem; height: 1rem; }

    .sidebar-nav .badge {
        margin-left: auto;
        background: var(--accent);
        color: #fff;
        font-size: .625rem;
        padding: 2px 7px;
        border-radius: 10px;
    }

    .sidebar-logout {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        color: var(--error);
        text-decoration: none;
        font-size: .8125rem;
        font-weight: 500;
        border-radius: var(--radius-sm);
        transition: all .2s;
    }

    .sidebar-logout:hover { background: var(--error-light); }

    /* ═══ MAIN CONTENT ═══ */
    .main-content {
        flex: 1;
        margin-left: var(--sidebar-w);
        padding: 28px 28px 64px;
        max-width: 100%;
    }

    .page-header { margin-bottom: 28px; }

    .page-title {
        font-weight: 800;
        font-size: 1.6rem;
        letter-spacing: -.02em;
    }

    .page-title span { color: var(--primary); }

    /* ═══ STATS GRID ═══ */
    .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 14px;
        margin-bottom: 28px;
    }

    .stat-card {
        background: var(--bg);
        border: 1px solid var(--border-light);
        border-radius: var(--radius-lg);
        padding: 20px;
        transition: all .3s;
        box-shadow: var(--shadow);
    }

    .stat-card:hover {
        border-color: var(--primary);
        box-shadow: var(--shadow-lg);
        transform: translateY(-2px);
    }

    .stat-icon {
        width: 38px;
        height: 38px;
        border-radius: var(--radius);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 10px;
    }

    .stat-value {
        font-weight: 800;
        font-size: 1.5rem;
        letter-spacing: -.02em;
    }

    .stat-label {
        font-size: .72rem;
        color: var(--text-muted);
        margin-top: 2px;
    }

    .stat-trend {
        font-size: .65rem;
        font-weight: 600;
        margin-top: 4px;
    }

    .stat-trend.up { color: var(--primary); }
    .stat-trend.down { color: var(--error); }

    /* ═══ SECTION CARD ═══ */
    .section-card {
        background: var(--bg);
        border: 1px solid var(--border-light);
        border-radius: var(--radius-lg);
        padding: 22px;
        margin-bottom: 20px;
        box-shadow: var(--shadow);
    }

    .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 18px;
        flex-wrap: wrap;
        gap: 10px;
    }

    .section-title {
        font-weight: 700;
        font-size: 1rem;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .section-title i { color: var(--primary); }

    /* ═══ TABLE ═══ */
    .table-wrapper {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        font-size: .78rem;
        min-width: 700px;
    }

    th {
        text-align: left;
        font-size: .65rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: .08em;
        color: var(--text-muted);
        padding: 10px 12px;
        border-bottom: 2px solid var(--border-light);
        white-space: nowrap;
        background: var(--surface);
    }

    td {
        padding: 10px 12px;
        border-bottom: 1px solid var(--border-light);
    }

    tr:hover td { background: var(--surface); }

    /* ═══ USER CELL ═══ */
    .user-cell {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .user-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: var(--text-primary);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: .7rem;
        overflow: hidden;
        flex-shrink: 0;
    }

    .user-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* ═══ VERIFIED BADGE ═══ */
    .verified-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 16px;
        height: 16px;
        background: var(--primary);
        border-radius: 50%;
        margin-left: 4px;
        flex-shrink: 0;
    }

    .verified-icon i {
        width: 10px;
        height: 10px;
        color: #FFFFFF;
        stroke-width: 4;
    }

    /* ═══ STATUS BADGES ═══ */
    .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 3px;
        padding: 3px 8px;
        border-radius: 100px;
        font-size: .65rem;
        font-weight: 600;
        white-space: nowrap;
    }

    .status-verified { background: var(--primary-light); color: var(--primary); }
    .status-pending { background: var(--accent-light); color: #D97706; }
    .status-blocked { background: var(--error-light); color: var(--error); }
    .status-active { background: var(--primary-light); color: var(--primary); }
    .status-completed { background: var(--primary-light); color: var(--primary); }
    .status-cancelled { background: var(--error-light); color: var(--error); }

    /* ═══ BUTTONS ═══ */
    .btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 6px 12px;
        border-radius: var(--radius-sm);
        font-family: 'Inter', sans-serif;
        font-size: .72rem;
        font-weight: 600;
        cursor: pointer;
        border: none;
        text-decoration: none;
        transition: all .2s;
        white-space: nowrap;
    }

    .btn i { width: .75rem; height: .75rem; }

    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-hover); }

    .btn-outline {
        background: var(--bg);
        color: var(--text-secondary);
        border: 1px solid var(--border);
    }
    .btn-outline:hover { border-color: var(--primary); color: var(--primary); }

    .btn-danger { background: var(--error); color: #fff; }
    .btn-danger:hover { background: #DC2626; }

    .btn-warning { background: var(--accent); color: #fff; }
    .btn-warning:hover { background: #D97706; }

    .action-group {
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
    }

    /* ═══ TABS ═══ */
    .tabs {
        display: flex;
        gap: 2px;
        border-bottom: 1px solid var(--border-light);
        margin-bottom: 18px;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
    }

    .tab {
        padding: 9px 16px;
        font-size: .78rem;
        font-weight: 500;
        color: var(--text-muted);
        cursor: pointer;
        border-bottom: 2px solid transparent;
        background: none;
        border-top: none;
        border-left: none;
        border-right: none;
        font-family: 'Inter', sans-serif;
        white-space: nowrap;
        transition: all .2s;
    }

    .tab:hover { color: var(--text-primary); }

    .tab.active {
        color: var(--primary);
        border-bottom-color: var(--primary);
        font-weight: 600;
    }

    /* ═══ LIVE DOT ═══ */
    .live-dot {
        width: 7px;
        height: 7px;
        background: var(--primary);
        border-radius: 50%;
        animation: pulse 2s infinite;
        display: inline-block;
    }

    /* ═══ SEARCH INPUT ═══ */
    .search-input {
        padding: 7px 12px;
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        font-family: 'Inter', sans-serif;
        font-size: .78rem;
        outline: none;
        max-width: 100%;
        width: 100%;
        transition: all .2s;
    }

    .search-input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px var(--primary-dim);
    }

    /* ═══ EMPTY STATE ═══ */
    .empty-state {
        text-align: center;
        padding: 40px 20px;
        color: var(--text-muted);
    }

    .empty-state i {
        display: block;
        margin: 0 auto 12px;
    }

    .empty-state p {
        font-size: .875rem;
    }

    /* ═══ LOADING SPINNER ═══ */
    .loading-spinner {
        text-align: center;
        padding: 40px;
    }

    .spinner {
        width: 28px;
        height: 28px;
        border: 3px solid var(--border-light);
        border-top-color: var(--primary);
        border-radius: 50%;
        margin: 0 auto 12px;
        animation: spin .7s linear infinite;
    }

    /* ═══ MODAL ═══ */
    .modal-overlay {
        position: fixed;
        inset: 0;
        z-index: 200;
        background: rgba(0, 0, 0, .5);
        backdrop-filter: blur(4px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        animation: fadeIn .2s;
    }

    .modal-content {
        background: #fff;
        border-radius: var(--radius-xl);
        padding: 28px;
        width: 100%;
        max-width: 600px;
        max-height: 85vh;
        overflow-y: auto;
        box-shadow: var(--shadow-lg);
        animation: slideUpModal .35s ease;
    }

    .modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 20px;
    }

    .modal-title {
        font-weight: 700;
        font-size: 1.1rem;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .modal-close {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--text-muted);
        padding: 6px;
        border-radius: var(--radius-sm);
        transition: all .2s;
    }

    .modal-close:hover { background: var(--surface); color: var(--text-primary); }

    /* ═══ DOCUMENTS MINI LIST ═══ */
    .doc-mini-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-top: 12px;
    }

    .doc-mini-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        background: var(--surface);
        border-radius: var(--radius-sm);
        font-size: .75rem;
    }

    .doc-mini-icon {
        width: 28px;
        height: 28px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
    }

    .doc-mini-status {
        margin-left: auto;
        font-size: .65rem;
        font-weight: 600;
        padding: 2px 8px;
        border-radius: 100px;
    }

    .doc-mini-pending { background: #FFF7ED; color: #F59E0B; }
    .doc-mini-approved { background: #F0FDF4; color: #22C55E; }
    .doc-mini-rejected { background: #FEF2F2; color: #EF4444; }

    /* ═══ VERIFICATION CARD ═══ */
    .verification-card {
        background: #FFFFFF;
        border: 1px solid var(--border-light);
        border-radius: var(--radius-lg);
        padding: 20px;
        margin-bottom: 12px;
        box-shadow: var(--shadow);
    }

    .verification-card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
    }

    .verification-actions {
        display: flex;
        gap: 8px;
        margin-top: 12px;
    }

    /* ═══ TOAST NOTIFICATIONS ═══ */
    .toast-container {
        position: fixed;
        top: 24px;
        right: 24px;
        z-index: 10000;
        display: flex;
        flex-direction: column;
        gap: 10px;
        pointer-events: none;
    }

    .toast {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 16px 20px;
        background: #FFFFFF;
        border: 1px solid var(--border-light);
        border-radius: var(--radius);
        box-shadow: 0 10px 30px rgba(0,0,0,.12);
        font-size: .875rem;
        font-weight: 500;
        color: var(--text-primary);
        pointer-events: auto;
        min-width: 320px;
        max-width: 420px;
        animation: toastIn .3s ease;
    }

    .toast.success { border-left: 4px solid #22C55E; }
    .toast.error { border-left: 4px solid #EF4444; }
    .toast.warning { border-left: 4px solid #F59E0B; }
    .toast.info { border-left: 4px solid #3B82F6; }

    .toast-icon {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
    }

    .toast.success .toast-icon { background: #F0FDF4; color: #22C55E; }
    .toast.error .toast-icon { background: #FEF2F2; color: #EF4444; }
    .toast.warning .toast-icon { background: #FFFBEB; color: #F59E0B; }
    .toast.info .toast-icon { background: #EFF6FF; color: #3B82F6; }

    .toast-message { flex: 1; line-height: 1.4; }

    .toast-close {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--text-muted);
        padding: 4px;
        border-radius: 6px;
        transition: all .2s;
        flex-shrink: 0;
    }

    .toast-close:hover { background: var(--surface); color: var(--text-primary); }

    .toast.removing { animation: toastOut .3s ease forwards; }

    /* ═══════════════════════════════════════════
       BOTTOM NAVBAR MOBILE
       ═══════════════════════════════════════════ */
    .bottom-navbar {
        display: none;
        position: fixed;
        bottom: 0; left: 0; right: 0;
        z-index: 150;
        background: rgba(255,255,255,0.95);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-top: 1px solid var(--border-light);
        padding: 4px 2px;
        padding-bottom: max(4px, env(safe-area-inset-bottom));
        box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
        animation: slideUpBottom .4s ease;
    }

    .bottom-nav-list {
        display: flex;
        align-items: center;
        justify-content: space-around;
        list-style: none;
        margin: 0;
        padding: 0;
        max-width: 500px;
        margin: 0 auto;
    }

    .bottom-nav-item { flex: 1; text-align: center; }

    .bottom-nav-link {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2px;
        padding: 5px 3px;
        text-decoration: none;
        color: var(--text-muted);
        font-size: .5625rem;
        font-weight: 500;
        font-family: 'Inter', sans-serif;
        transition: all .2s;
        border-radius: 10px;
        position: relative;
        min-height: 44px;
        -webkit-tap-highlight-color: transparent;
    }

    .bottom-nav-link i { width: 1.25rem; height: 1.25rem; transition: all .2s; }

    .bottom-nav-link span {
        line-height: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 100%;
    }

    .bottom-nav-link.active { color: var(--primary); font-weight: 600; }

    .bottom-nav-link.active::before {
        content: '';
        position: absolute;
        top: 0; left: 50%;
        transform: translateX(-50%);
        width: 20px;
        height: 2px;
        background: var(--primary);
        border-radius: 0 0 2px 2px;
    }

    .bottom-nav-link:active {
        transform: scale(.95);
        background: var(--border-light);
    }

    /* ═══ MORE MENU DROPDOWN ═══ */
    .more-menu-dropdown {
        position: fixed;
        bottom: calc(var(--bottom-nav-h) + 8px + env(safe-area-inset-bottom));
        right: 8px;
        background: #fff;
        border: 1px solid var(--border-light);
        border-radius: 16px;
        box-shadow: 0 8px 32px rgba(0,0,0,.12);
        padding: 6px;
        z-index: 160;
        min-width: 160px;
        animation: fadeUp .3s ease;
    }

    .more-menu-dropdown a {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        text-decoration: none;
        color: var(--text-primary);
        font-size: .8125rem;
        font-weight: 500;
        font-family: 'Inter', sans-serif;
        border-radius: 10px;
        transition: background .2s;
    }

    .more-menu-dropdown a:hover { background: var(--surface); }
    .more-menu-dropdown a i { width: 1.1rem; height: 1.1rem; color: var(--text-muted); }

    /* ═══ MENU TOGGLE MOBILE ═══ */
    .menu-toggle {
        display: none;
        position: fixed;
        top: 12px; left: 12px;
        z-index: 101;
        background: #fff;
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 8px 12px;
        cursor: pointer;
        font-family: 'Inter', sans-serif;
        font-size: .75rem;
        font-weight: 600;
        color: var(--text-primary);
        align-items: center;
        gap: 6px;
        box-shadow: var(--shadow);
    }

    /* ═══ RESPONSIVE ═══ */
    @media (min-width: 1024px) {
        .bottom-navbar { display: none !important; }
        .menu-toggle { display: none !important; }
        .sidebar { display: flex !important; }
    }

    @media (max-width: 1023px) {
        .sidebar { display: none !important; }
        .bottom-navbar { display: block; }
        .menu-toggle { display: flex; }
        .main-content {
            margin-left: 0 !important;
            padding: 20px 14px;
            padding-bottom: calc(var(--bottom-nav-h) + 20px + env(safe-area-inset-bottom)) !important;
        }
        .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .stat-card { padding: 16px; }
        .stat-value { font-size: 1.25rem; }
        .page-title { font-size: 1.35rem; }
        .modal-content { max-width: 95%; margin: 0; }
    }

    @media (max-width: 767px) {
        .main-content {
            padding: 16px 10px;
            padding-bottom: calc(var(--bottom-nav-h) + 16px + env(safe-area-inset-bottom)) !important;
            padding-top: 56px;
        }
        .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .section-card { padding: 16px; }
        .modal-overlay { padding: 12px; align-items: flex-end; }
        .modal-content {
            max-width: 100%;
            border-radius: 20px 20px 0 0;
            padding: 24px 18px;
            max-height: 88vh;
            animation: slideUpMobile .35s ease;

// ═══ TOAST SYSTEM ═══
function showToast(message, type = 'info') {
    let container = document.getElementById('toastContainer');
    if (!container) {
        container = document.createElement('div');
        container.id = 'toastContainer';
        container.className = 'toast-container';
        document.body.appendChild(container);
    }
    
    const icons = { success: 'check-circle', error: 'x-circle', warning: 'alert-triangle', info: 'info' };
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `
        <div class="toast-icon"><i data-lucide="${icons[type] || 'info'}" style="width:1rem;height:1rem"></i></div>
        <div class="toast-message">${message}</div>
        <button class="toast-close" onclick="this.parentElement.remove()"><i data-lucide="x" style="width:1rem;height:1rem"></i></button>`;
    
    container.appendChild(toast);
    lucide.createIcons({ nodes: [toast] });
    
    setTimeout(() => {
        toast.classList.add('removing');
        setTimeout(() => toast.remove(), 300);
    }, 4000);
}

let userFilter = 'prestataire';
async function filterUserTable(filter, btn) {

    const { data } = await query;
    const filtered = q ? (data||[]).filter(u => (u.full_name||'').toLowerCase().includes(q) || (u.email||'').toLowerCase().includes(q)) : (data||[]);
    document.getElementById('userTableTitle').textContent = userFilter === 'prestataire' ? 'Prestataires' : userFilter === 'client' ? 'Clients' : 'Tous';

// ═══════════════════════════════════════════════════════════════
// REMPLACER la fonction loadVerificationData() par celle-ci
// ═══════════════════════════════════════════════════════════════

async function loadVerificationData() {
    // 1. Charger les utilisateurs en attente de vérification
    const { data: users } = await sb
        .from('users')
        .select('*')
        .eq('role', 'prestataire')
        .eq('verification_status', 'pending')
        .order('created_at');
    
    const container = document.getElementById('verificationTable');
    
    if (!users?.length) {
        container.innerHTML = `
            <div class="empty-state">
                <i data-lucide="check-circle" style="color:var(--primary);width:3rem;height:3rem"></i>
                <p style="font-weight:600;color:var(--primary);font-size:1rem">Tous les prestataires sont vérifiés !</p>
                <p style="font-size:.8125rem;color:var(--text-muted)">Aucun document en attente de validation.</p>
            </div>`;
        document.getElementById('pendingCount').textContent = '0 en attente';
        lucide.createIcons();
        return;
    }
    
    document.getElementById('pendingCount').textContent = `${users.length} prestataire(s) en attente`;
    
    // 2. Charger TOUS les documents pour ces utilisateurs
    const userIds = users.map(u => u.id);
    const { data: allDocs } = await sb
        .from('verification_documents')
        .select('*')
        .in('user_id', userIds)
        .order('submitted_at', { ascending: false });
    
    // 3. Grouper les documents par utilisateur
    const docsByUser = {};
    (allDocs || []).forEach(d => {
        if (!docsByUser[d.user_id]) docsByUser[d.user_id] = [];
        docsByUser[d.user_id].push(d);
    });
    
    // 4. Rendu HTML
    container.innerHTML = users.map(user => {
        const userDocs = docsByUser[user.id] || [];
        
        return `
        <div class="verification-card">
            <!-- En-tête avec infos utilisateur -->
            <div class="verification-card-header">
                <div style="display:flex;align-items:center;gap:12px">
                    <div class="user-avatar" style="width:44px;height:44px;font-size:.9rem">
                        ${user.profile_photo_url 
                            ? `<img src="${user.profile_photo_url}" alt="">` 
                            : (user.full_name || '?')[0].toUpperCase()}
                    </div>
                    <div>
                        <div style="font-weight:700;font-size:.9rem;display:flex;align-items:center;gap:6px">
                            ${esc(user.full_name)}
                            ${user.is_verified ? '<span class="verified-icon"><i data-lucide="check"></i></span>' : ''}
                        </div>
                        <div style="font-size:.75rem;color:var(--text-muted)">
                            ${esc(user.email)} · ${esc(user.phone || '—')}
                        </div>
                        <div style="font-size:.7rem;color:var(--text-muted);margin-top:2px">
                            ${esc(user.city || '—')}${user.neighborhood ? ' · ' + esc(user.neighborhood) : ''}
                        </div>
                    </div>
                </div>
                <div style="text-align:right">
                    <div style="font-size:.7rem;color:var(--text-muted)">Inscrit le</div>
                    <div style="font-size:.75rem;font-weight:600">${fmtDate(user.created_at)}</div>
                    <div style="margin-top:4px">
                        <span class="status-badge status-pending">
                            <span class="live-dot" style="width:6px;height:6px"></span> 
                            ${userDocs.length} document(s)
                        </span>
                    </div>
                </div>
            </div>
            
            <!-- Liste des documents -->
            ${userDocs.length > 0 ? `
            <div style="background:var(--surface);border-radius:var(--radius);padding:4px;margin-bottom:8px">
                <div style="font-weight:600;font-size:.75rem;color:var(--text-muted);padding:8px 12px 4px">
                    📄 Documents soumis (${userDocs.length})
                </div>
                <div class="documents-list-admin">
                    ${userDocs.map(doc => renderDocumentItem(doc)).join('')}
                </div>
            </div>
            ` : `
            <div style="background:var(--surface);border-radius:var(--radius);padding:16px;text-align:center;margin-bottom:8px">
                <i data-lucide="file-x" style="width:1.5rem;height:1.5rem;color:var(--text-muted);margin-bottom:6px"></i>
                <p style="font-size:.75rem;color:var(--text-muted)">Aucun document soumis</p>
            </div>
            `}
            
            <!-- Actions -->
            <div class="verification-actions">
                <button class="btn btn-primary" onclick="verifyProvider('${user.id}')">
                    <i data-lucide="check"></i> Approuver tout
                </button>
                <button class="btn btn-outline" onclick="viewProfile('${user.id}')">
                    <i data-lucide="eye"></i> Profil complet
                </button>
                <button class="btn btn-danger" onclick="rejectProvider('${user.id}')">
                    <i data-lucide="x"></i> Rejeter tout
                </button>
            </div>
        </div>`;
    }).join('');
    
    lucide.createIcons();
}

// ═══════════════════════════════════════════════════════════════
// FONCTION POUR AFFICHER UN DOCUMENT
// ═══════════════════════════════════════════════════════════════
function renderDocumentItem(doc) {
    const typeConfig = DOC_COLORS[doc.document_type] || DOC_COLORS['other'];
    const typeLabel = DOCUMENT_TYPES[doc.document_type] || doc.document_type;
    const docIcon = DOC_ICONS[doc.document_type] || 'file';
    
    // Statut du document
    let statusClass, statusLabel, statusIcon;
    if (doc.document_status === 'approved') {
        statusClass = 'doc-status-approved';
        statusLabel = 'Approuvé';
        statusIcon = 'check-circle';
    } else if (doc.document_status === 'rejected') {
        statusClass = 'doc-status-rejected';
        statusLabel = 'Rejeté';
        statusIcon = 'x-circle';
    } else {
        statusClass = 'doc-status-pending';
        statusLabel = 'En attente';
        statusIcon = 'clock';
    }
    
    // Déterminer si on peut afficher un aperçu
    const isImage = doc.document_url?.match(/\.(jpg|jpeg|png|webp|gif)(\?|$)/i);
    const isPDF = doc.document_url?.match(/\.(pdf)(\?|$)/i);
    
    return `
    <div class="document-admin-item ${statusClass}" id="doc-${doc.id}">
        <div class="doc-admin-icon" style="background:${typeConfig.bg};color:${typeConfig.color}">
            <i data-lucide="${docIcon}"></i>
        </div>
        <div class="doc-admin-info">
            <div class="doc-admin-name">${typeLabel}</div>
            <div class="doc-admin-date">${fmtDate(doc.submitted_at)}</div>
            ${doc.reviewer_notes ? `<div class="doc-admin-note">📝 ${esc(doc.reviewer_notes)}</div>` : ''}
        </div>
        <div class="doc-admin-status">
            <span class="doc-status-badge ${statusClass}">
                <i data-lucide="${statusIcon}" style="width:.7rem;height:.7rem"></i> ${statusLabel}
            </span>
        </div>
        <div class="doc-admin-actions">
            ${isImage ? `
            <button class="btn btn-outline" onclick="previewDocument('${doc.document_url}', '${typeLabel}', 'image')" title="Aperçu">
                <i data-lucide="eye"></i>
            </button>
            ` : isPDF ? `
            <button class="btn btn-outline" onclick="previewDocument('${doc.document_url}', '${typeLabel}', 'pdf')" title="Aperçu">
                <i data-lucide="eye"></i>
            </button>
            ` : ''}
            <a href="${doc.document_url}" target="_blank" class="btn btn-outline" title="Ouvrir">
                <i data-lucide="external-link"></i>
            </a>
            ${doc.document_status === 'pending' ? `
            <button class="btn btn-primary" onclick="approveDocument('${doc.id}', '${doc.user_id}')" title="Approuver">
                <i data-lucide="check"></i>
            </button>
            <button class="btn btn-danger" onclick="rejectDocument('${doc.id}', '${doc.user_id}')" title="Rejeter">
                <i data-lucide="x"></i>
            </button>
            ` : ''}
        </div>
    </div>`;
}

// ═══════════════════════════════════════════════════════════════
// FONCTIONS D'ACTION SUR LES DOCUMENTS
// ═══════════════════════════════════════════════════════════════

async function approveDocument(docId, userId) {
    try {
        // Approuver le document
        await sb.from('verification_documents')
            .update({ 
                document_status: 'approved', 
                reviewed_at: new Date().toISOString() 
            })
            .eq('id', docId);
        
        // Vérifier si tous les documents sont approuvés
        const { data: docs } = await sb
            .from('verification_documents')
            .select('document_status')
            .eq('user_id', userId);
        
        const allApproved = docs?.every(d => d.document_status === 'approved');
        
        if (allApproved) {
            // Si tous les docs sont approuvés, vérifier l'utilisateur
            await sb.from('users')
                .update({ 
                    status: 'verified', 
                    is_verified: true, 
                    verification_status: 'verified' 
                })
                .eq('id', userId);
            showToast('✅ Tous les documents sont approuvés ! Prestataire vérifié.', 'success');
        } else {
            showToast('✅ Document approuvé avec succès.', 'success');
        }
        
        // Rafraîchir
        loadVerificationData();
        loadPendingCount();
    } catch (err) {
        showToast('❌ Erreur : ' + err.message, 'error');
    }
}

async function rejectDocument(docId, userId) {
    const note = prompt('Motif du rejet (optionnel) :');
    if (note === null) return; // Annulé
    
    try {
        // Rejeter le document
        await sb.from('verification_documents')
            .update({ 
                document_status: 'rejected', 
                reviewed_at: new Date().toISOString(),
                reviewer_notes: note || null 
            })
            .eq('id', docId);
        
        // Mettre à jour le statut de l'utilisateur
        await sb.from('users')
            .update({ verification_status: 'rejected' })
            .eq('id', userId);
        
        showToast('🚫 Document rejeté.', 'warning');
        
        // Rafraîchir
        loadVerificationData();
        loadPendingCount();
    } catch (err) {
        showToast('❌ Erreur : ' + err.message, 'error');
    }
}

// ═══════════════════════════════════════════════════════════════
// APERÇU DU DOCUMENT
// ═══════════════════════════════════════════════════════════════
function previewDocument(url, title, type) {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.style.zIndex = '300';
    overlay.onclick = function(e) { 
        if (e.target === overlay) overlay.remove(); 
    };
    
    let contentHtml = '';
    
    if (type === 'image') {
        contentHtml = `
            <div style="text-align:center">
                <img src="${url}" alt="${title}" style="max-width:100%;max-height:70vh;border-radius:var(--radius);object-fit:contain">
            </div>`;
    } else if (type === 'pdf') {
        contentHtml = `
            <div style="text-align:center">
                <iframe src="${url}" style="width:100%;height:70vh;border:none;border-radius:var(--radius)"></iframe>
            </div>`;
    } else {
        contentHtml = `
            <div style="text-align:center;padding:40px">
                <i data-lucide="file-text" style="width:3rem;height:3rem;color:var(--text-muted);margin-bottom:16px"></i>
                <p>Ce type de fichier ne peut pas être prévisualisé.</p>
                <a href="${url}" target="_blank" class="btn btn-primary" style="margin-top:16px">
                    <i data-lucide="external-link"></i> Ouvrir le fichier
                </a>
            </div>`;
    }
    
    overlay.innerHTML = `
        <div class="modal-content" onclick="event.stopPropagation()" style="max-width:800px;width:95%">
            <div class="modal-header">
                <h3 class="modal-title">
                    <i data-lucide="file-text" style="color:var(--primary)"></i> ${title}
                </h3>
                <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">
                    <i data-lucide="x"></i>
                </button>
            </div>
            ${contentHtml}
            <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:16px;border-top:1px solid var(--border-light)">
                <a href="${url}" target="_blank" class="btn btn-outline">
                    <i data-lucide="external-link"></i> Ouvrir dans un nouvel onglet
                </a>
                <a href="${url}" download class="btn btn-primary">
                    <i data-lucide="download"></i> Télécharger
                </a>
            </div>
        </div>`;
    
    document.body.appendChild(overlay);
    lucide.createIcons();
}

// ═══ ACTIONS AVEC TOASTS ═══
async function verifyProvider(id) {
    try {
        // Approuver tous les documents en attente
        await sb.from('verification_documents').update({ document_status: 'approved', reviewed_at: new Date().toISOString() }).eq('user_id', id).eq('document_status', 'pending');
        
        // Mettre à jour l'utilisateur
        await sb.from('users').update({ status: 'verified', is_verified: true, verification_status: 'verified' }).eq('id', id);
        
        showToast('✅ Prestataire vérifié avec succès ! Tous ses documents ont été approuvés.', 'success');
        loadTab(currentTab);
        loadPendingCount();
    } catch (err) {
        showToast('❌ Erreur : ' + err.message, 'error');
    }
}

async function rejectProvider(id) {
    const note = prompt('Motif du rejet (optionnel) :');
    if (note === null) return; // Annulé
    
    try {
        // Rejeter tous les documents en attente
        await sb.from('verification_documents').update({ document_status: 'rejected', reviewed_at: new Date().toISOString(), reviewer_notes: note || null }).eq('user_id', id).eq('document_status', 'pending');
        
        // Mettre à jour l'utilisateur
        await sb.from('users').update({ verification_status: 'rejected' }).eq('id', id);
        
        showToast('🚫 Prestataire rejeté. Ses documents ont été marqués comme rejetés.', 'warning');
        loadTab(currentTab);
        loadPendingCount();
    } catch (err) {
        showToast('❌ Erreur : ' + err.message, 'error');
    }
}

async function blockUser(id) {
    if (!confirm('Bloquer cet utilisateur ?')) return;
    await sb.from('users').update({ status: 'blocked' }).eq('id', id);
    showToast('🚫 Utilisateur bloqué.', 'warning');
    loadTab(currentTab);
}

async function unblockUser(id) {
    if (!confirm('Débloquer cet utilisateur ?')) return;
    await sb.from('users').update({ status: 'active' }).eq('id', id);
    showToast('✅ Utilisateur débloqué.', 'success');
    loadTab(currentTab);
}

// ═══ VIEW PROFILE (AMÉLIORÉ) ═══
async function viewProfile(userId) {
    const { data: user } = await sb.from('users').select('*').eq('id', userId).single();
    if (!user) return;
    
    const [servicesRes, ordersRes, docsRes] = await Promise.all([
        sb.from('services').select('*').eq('user_id', userId),
        sb.from('orders').select('*, service:service_id(title)').eq('provider_id', userId).order('created_at', { ascending: false }).limit(10),
        sb.from('verification_documents').select('*').eq('user_id', userId).order('submitted_at', { ascending: false })
    ]);
    
    const services = servicesRes.data || [];
    const orders = ordersRes.data || [];
    const docs = docsRes.data || [];
    const initials = (user.full_name || '?').split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
    
    const overlay = document.createElement('div');

        <div class="modal-header">

                <div style="font-weight:700;font-size:1.1rem;display:flex;align-items:center;gap:6px">${esc(user.full_name)}${user.is_verified ? '<span class="verified-icon" style="width:18px;height:18px"><i data-lucide="check" style="width:11px;height:11px"></i></span>' : ''}</div>

        </div>
        
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;text-align:center;background:var(--surface);border-radius:12px;padding:14px;margin-bottom:16px">
            <div><div style="font-weight:800;font-size:1.1rem">${services.length}</div><div style="font-size:.65rem;color:var(--text-muted)">Services</div></div>
            <div><div style="font-weight:800;font-size:1.1rem">${orders.length}</div><div style="font-size:.65rem;color:var(--text-muted)">Commandes</div></div>
            <div><div style="font-weight:800;font-size:1.1rem">${user.is_verified ? '✅' : '❌'}</div><div style="font-size:.65rem;color:var(--text-muted)">Vérifié</div></div>
            <div><div style="font-weight:800;font-size:1.1rem">${user.status || 'actif'}</div><div style="font-size:.65rem;color:var(--text-muted)">Statut</div></div>
