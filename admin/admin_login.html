<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — travailici</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #22C55E; --primary-hover: #16A34A; --primary-light: #F0FDF4;
            --text-primary: #111827; --text-secondary: #4B5563; --text-muted: #6B7280;
            --bg: #FFFFFF; --surface: #F9FAFB; --border: #E5E7EB; --error: #EF4444; --error-light: #FEF2F2;
            --radius: 12px; --radius-lg: 16px; --shadow: 0 4px 20px rgba(0,0,0,.06); --shadow-lg: 0 20px 60px rgba(0,0,0,.1);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif; background:linear-gradient(135deg,#111827 0%,#1F2937 50%,#111827 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; -webkit-font-smoothing:antialiased; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        @keyframes spin { to{transform:rotate(360deg)} }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

        .login-container { width:100%; max-width:420px; animation:fadeUp .5s ease; }
        .login-card { background:var(--bg); border-radius:20px; padding:36px 32px; box-shadow:var(--shadow-lg); border:1px solid rgba(255,255,255,.1); }
        .login-header { text-align:center; margin-bottom:32px; }
        .login-icon { width:56px; height:56px; border-radius:50%; background:linear-gradient(135deg,#F59E0B,#D97706); color:#fff; display:flex; align-items:center; justify-content:center; margin:0 auto 16px; box-shadow:0 4px 16px rgba(245,158,11,.3); }
        .login-icon i { width:1.5rem; height:1.5rem; }
        .login-header h1 { font-weight:800; font-size:1.4rem; color:var(--text-primary); }
        .login-header p { font-size:.8125rem; color:var(--text-muted); margin-top:4px; }

        .form-group { margin-bottom:18px; }
        .form-group label { display:block; font-size:.75rem; font-weight:600; color:var(--text-primary); margin-bottom:6px; }
        .input-wrap { position:relative; }
        .input-wrap input { width:100%; padding:12px 14px 12px 42px; border:1.5px solid var(--border); border-radius:var(--radius); font-family:'Inter',sans-serif; font-size:.875rem; color:var(--text-primary); outline:none; transition:all .2s; background:var(--bg); }
        .input-wrap input:focus { border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-light); }
        .input-wrap i { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--text-muted); }

        .btn { width:100%; padding:13px; border-radius:var(--radius); font-family:'Inter',sans-serif; font-weight:600; font-size:.875rem; cursor:pointer; border:none; transition:all .2s; display:flex; align-items:center; justify-content:center; gap:8px; }
        .btn-primary { background:var(--primary); color:#fff; }
        .btn-primary:hover { background:var(--primary-hover); transform:translateY(-1px); }
        .btn-primary:disabled { opacity:.5; cursor:not-allowed; }
        .spinner { width:18px; height:18px; border:2px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin .6s linear infinite; display:none; }
        .btn.loading .spinner { display:inline-block; }
        .btn.loading .btn-text { display:none; }

        .alert { padding:12px 14px; border-radius:var(--radius); font-size:.75rem; font-weight:500; margin-bottom:16px; display:none; }
        .alert.error { background:var(--error-light); color:var(--error); display:block; }

        .footer-text { text-align:center; margin-top:20px; font-size:.75rem; color:rgba(255,255,255,.4); }
        .footer-text a { color:rgba(255,255,255,.6); text-decoration:none; }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <div class="login-icon"><i data-lucide="shield-check"></i></div>
            <h1>Admin travailici</h1>
            <p>Accès réservé aux administrateurs</p>
        </div>

        <div class="alert" id="formAlert"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>Email administrateur</label>
                <div class="input-wrap">
                    <i data-lucide="mail" style="width:1rem;height:1rem"></i>
                    <input type="email" id="emailInput" placeholder="admin@travailici.com" required>
                </div>
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <div class="input-wrap">
                    <i data-lucide="lock" style="width:1rem;height:1rem"></i>
                    <input type="password" id="passwordInput" placeholder="••••••••" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" id="loginBtn">
                <span class="btn-text"><i data-lucide="log-in" style="width:1rem;height:1rem"></i> Accéder au panel admin</span>
                <div class="spinner"></div>
            </button>
        </form>
    </div>
    <p class="footer-text"><a href="../landing.html">← Retour au site</a></p>
</div>

<script>
var SUPABASE_URL = 'https://cwubxwbzzuigctvgdygv.supabase.co';
var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN3dWJ4d2J6enVpZ2N0dmdkeWd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMzI2MTgsImV4cCI6MjA5MzgwODYxOH0.0mwBNo_S5yItQQjq2at9GNRN74ooZRBJIbZGDH9L2uk';
var sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

lucide.createIcons();

document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    var email = document.getElementById('emailInput').value.trim();
    var password = document.getElementById('passwordInput').value;
    var btn = document.getElementById('loginBtn');
    var alert = document.getElementById('formAlert');

    alert.style.display = 'none';

    if (!email || !password) {
        alert.innerHTML = 'Veuillez remplir tous les champs.';
        alert.className = 'alert error';
        return;
    }

    btn.classList.add('loading');
    btn.disabled = true;

    try {
        // 1. Connexion Supabase Auth
        var { data, error } = await sb.auth.signInWithPassword({ email: email, password: password });
        
        if (error) {
            var msg = error.message;
            if (msg.indexOf('Invalid') !== -1) msg = 'Email ou mot de passe incorrect.';
            alert.innerHTML = msg;
            alert.className = 'alert error';
            btn.classList.remove('loading');
            btn.disabled = false;
            return;
        }

        if (!data.user) {
            alert.innerHTML = 'Erreur inattendue.';
            alert.className = 'alert error';
            btn.classList.remove('loading');
            btn.disabled = false;
            return;
        }

        // 2. Vérifier que c'est bien un admin
        var { data: profile } = await sb.from('users').select('role').eq('id', data.user.id).single();

        if (!profile || profile.role !== 'admin') {
            alert.innerHTML = '⛔ Accès refusé. Vous n\'êtes pas administrateur.';
            alert.className = 'alert error';
            await sb.auth.signOut(); // Déconnecter
            btn.classList.remove('loading');
            btn.disabled = false;
            return;
        }

        // 3. Rediriger vers le dashboard admin
        window.location.href = 'admin.html';

    } catch (err) {
        alert.innerHTML = 'Erreur de connexion. Réessayez.';
        alert.className = 'alert error';
        btn.classList.remove('loading');
        btn.disabled = false;
    }
});
</script>
</body>
</html>
