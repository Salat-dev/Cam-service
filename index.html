<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0;url=landing.html">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>warap — Marketplace de services au Cameroun</title>
    <meta name="description" content="Trouvez des prestataires vérifiés près de chez vous : plomberie, électricité, design, photographie et plus encore.">
    <meta name="theme-color" content="#C4943E">
    <link rel="icon" type="image/x-icon" href="icons/favicon.ico">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <link rel="manifest" href="manifest.json">

    <!-- Open Graph -->
    <meta property="og:title" content="warap — Trouvez le prestataire idéal">
    <meta property="og:description" content="La première marketplace de services professionnels au Cameroun.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="icons/logo-512.png">

    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    
    body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background: #111827;
        color: #FFFFFF;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
    }
    
    .loader {
        animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    .logo {
        font-size: 1.75rem;
        font-weight: 800;
        letter-spacing: -0.03em;
        margin-bottom: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 2px;
    }
    
    .logo .accent {
        font-size: 2.5rem;
        color: #22C55E;
        position: relative;
        top: 4px;
        font-weight: 700;
    }
    
    .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid rgba(34, 197, 94, 0.15);
        border-top-color: #22C55E;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 20px;
    }
    
    .text {
        font-size: 0.9375rem;
        color: rgba(255, 255, 255, 0.6);
        font-weight: 400;
        line-height: 1.5;
    }
    
    .text a {
        color: #22C55E;
        text-decoration: none;
        font-weight: 600;
        transition: color 0.2s;
    }
    
    .text a:hover {
        color: #16A34A;
        text-decoration: underline;
    }
    
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    
    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: scale(0.96);
        }
        to {
            opacity: 1;
            transform: scale(1);
        }
    }
</style>
    <link href="https://fonts.googleapis.com/css2?family=Allison&family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="loader">
        <div class="logo">
            <img src="../asset/logo.svg" alt="warap" style="height: 40px;">

        </div>
        <div class="spinner"></div>
        <p class="text">Redirection en cours... <a href="./marketplace/landing.html">Cliquez ici</a> si rien ne se passe.</p>
    </div>
    <script>window.location.href = './marketplace/landing.html';</script>
</body>
</html>
