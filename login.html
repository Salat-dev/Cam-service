<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — CamServices</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Allison&family=Outfit:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <link rel="stylesheet" href="/css/global.css">
    <style>
        :root {
            --ink: #1A1714; --ink-2: #2E2A25; --muted: #8A8279; --faint: #C9C2B8;
            --rule: #E8E2DA; --cream: #FAF8F5; --white: #FFFFFF;
            --gold: #C4943E; --gold-light: #D4A94E; --gold-dim: rgba(196,148,62,.08);
            --green: #3D8B5E; --green-light: #F0FDF4; --red: #DC2626; --red-light: #FEF2F2;
            --blue: #3B82F6; --blue-light: #EFF6FF;
            --ff-body: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            --ff-script: 'Allison', cursive;
            --ease: cubic-bezier(.22,1,.36,1);
            --radius: 10px; --radius-lg: 16px; --radius-xl: 24px;
            --shadow-sm: 0 1px 3px rgba(26,23,20,.04);
            --shadow: 0 8px 32px rgba(26,23,20,.08);
            --shadow-lg: 0 20px 60px rgba(26,23,20,.12);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--ff-body); background: var(--cream); color: var(--ink);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 24px; -webkit-font-smoothing: antialiased; position: relative; overflow-x: hidden;
        }
        .bg-decoration { position: fixed; pointer-events: none; z-index: 0; }
        .bg-circle-1 {
            top: -180px; right: -120px; width: 500px; height: 500px; border-radius: 50%;
            background: radial-gradient(circle, rgba(196,148,62,.06) 0%, transparent 70%);
        }
        .bg-circle-2 {
            bottom: -150px; left: -100px; width: 400px; height: 400px; border-radius: 50%;
            background: radial-gradient(circle, rgba(196,148,62,.04) 0%, transparent 70%);
        }
        .auth-container { position: relative; z-index: 1; width: 100%; max-width: 460px; }
        .auth-card {
            background: var(--white); border: 1px solid var(--rule);
            border-radius: var(--radius-xl); box-shadow: var(--shadow-lg); overflow: hidden;
        }
        .auth-header { padding: 44px 40px 32px; text-align: center; border-bottom: 1px solid var(--rule); }
        .auth-logo { font-weight: 700; font-size: 1.4rem; color: var(--ink); text-decoration: none; display: inline-block; margin-bottom: 16px; }
        .auth-logo .script { font-family: var(--ff-script); font-size: 2.6rem; color: var(--gold); line-height: 0; position: relative; top: 4px; }
        .auth-title { font-weight: 800; font-size: 1.5rem; letter-spacing: -.03em; margin-bottom: 6px; }
        .auth-subtitle { font-size: .88rem; color: var(--muted); font-weight: 300; }
        .auth-body { padding: 36px 40px 40px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: .78rem; font-weight: 600; color: var(--ink); margin-bottom: 6px; }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-icon { position: absolute; left: 14px; color: var(--faint); pointer-events: none; z-index: 1; display: flex; }
        input[type="email"], input[type="password"], input[type="text"] {
            width: 100%; padding: 12px 14px 12px 42px; border: 1.5px solid var(--rule);
            border-radius: var(--radius); font-family: var(--ff-body); font-size: .9rem;
            color: var(--ink); background: var(--white); outline: none; transition: all .25s var(--ease);
        }
        input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px var(--gold-dim); }
        input::placeholder { color: var(--faint); font-weight: 300; }
        .password-toggle {
            position: absolute; right: 14px; background: none; border: none;
            cursor: pointer; color: var(--faint); padding: 4px; display: flex; z-index: 1;
        }
        .password-toggle:hover { color: var(--muted); }
        .form-row-options { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
        .remember-me { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: .82rem; color: var(--muted); }
        .remember-me input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--gold); cursor: pointer; }
        .forgot-link { font-size: .8rem; color: var(--muted); text-decoration: none; font-weight: 500; }
        .forgot-link:hover { color: var(--gold); }
        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 10px;
            font-family: var(--ff-body); font-weight: 600; font-size: .9rem; padding: 14px 28px;
            border-radius: var(--radius); border: none; cursor: pointer; width: 100%;
            transition: all .3s var(--ease); letter-spacing: .01em;
        }
        .btn-primary { background: var(--ink); color: var(--white); box-shadow: var(--shadow-sm); }
        .btn-primary:hover { background: var(--ink-2); transform: translateY(-1px); box-shadow: var(--shadow); }
        .btn-primary:disabled { opacity: .6; cursor: not-allowed; transform: none; }
        .divider { display: flex; align-items: center; gap: 16px; margin: 28px 0; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--rule); }
        .divider span { font-size: .72rem; font-weight: 500; color: var(--faint); text-transform: uppercase; letter-spacing: .1em; white-space: nowrap; }
        .social-login { display: flex; flex-direction: column; gap: 10px; }
        .btn-social {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            padding: 12px; border: 1.5px solid var(--rule); border-radius: var(--radius);
            background: var(--white); font-family: var(--ff-body); font-weight: 500;
            font-size: .85rem; color: var(--ink); cursor: pointer; transition: all .25s var(--ease);
        }
        .btn-social:hover { background: var(--cream); border-color: var(--gold); }
        .auth-footer { text-align: center; padding: 20px 40px; border-top: 1px solid var(--rule); font-size: .82rem; color: var(--muted); }
        .auth-footer a { color: var(--gold); font-weight: 600; text-decoration: none; }
        .auth-footer a:hover { color: var(--gold-light); text-decoration: underline; }
        .alert {
            padding: 12px 16px; border-radius: var(--radius); font-size: .8rem;
            margin-bottom: 20px; display: none; align-items: center; gap: 10px; font-weight: 500;
        }
        .alert.error { background: var(--red-light); color: var(--red); display: flex; border: 1px solid rgba(220,38,38,.15); }
        .alert.success { background: var(--green-light); color: var(--green); display: flex; border: 1px solid rgba(61,139,94,.15); }
        .alert.info { background: var(--blue-light); color: var(--blue); display: flex; border: 1px solid rgba(59,130,246,.15); }
        @media (max-width: 500px) {
            .auth-header { padding: 32px 24px 24px; }
            .auth-body { padding: 28px 24px 32px; }
            .auth-footer { padding: 16px 24px; }
            .form-row-options { flex-direction: column; gap: 10px; align-items: flex-start; }
        }
    </style>
</head>
<body>

<div class="bg-decoration bg-circle-1"></div>
<div class="bg-decoration bg-circle-2"></div>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <a href="landing.html" class="auth-logo">Cam<span class="script">S</span>ervices</a>
            <h1 class="auth-title">Content de vous revoir</h1>
            <p class="auth-subtitle">Connectez-vous pour accéder à votre compte</p>
        </div>

        <div class="auth-body">
            <div class="alert" id="formAlert"></div>

            <form id="loginForm" autocomplete="on">
                <div class="form-group">
                    <label for="email">Adresse email</label>
                    <div class="input-wrapper">
                        <span class="input-icon"><i data-lucide="mail"></i></span>
                        <input type="email" id="email" name="email" placeholder="jean@email.com" required autocomplete="email">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <div class="input-wrapper">
                        <span class="input-icon"><i data-lucide="lock"></i></span>
                        <input type="password" id="password" name="password" placeholder="Votre mot de passe" required autocomplete="current-password" minlength="6">
                        <button type="button" class="password-toggle" id="togglePassword" title="Afficher">
                            <i data-lucide="eye" style="width:1.1rem;height:1.1rem" id="toggleIcon"></i>
                        </button>
                    </div>
                </div>

                <div class="form-row-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <span>Se souvenir de moi</span>
                    </label>
                    <a href="forgot-password.html" class="forgot-link">Mot de passe oublié ?</a>
                </div>

                <button type="submit" class="btn btn-primary" id="loginBtn">Se connecter</button>
            </form>

            <div class="divider"><span>ou continuer avec</span></div>

            <div class="social-login">
                <button type="button" class="btn-social" id="googleBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1Z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23Z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62Z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53Z" fill="#EA4335"/></svg>
                    Continuer avec Google
                </button>
                <button type="button" class="btn-social" id="facebookBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                    Continuer avec Facebook
                </button>
            </div>
        </div>

        <div class="auth-footer">
            Pas encore de compte ? <a href="register.html">Créer un compte gratuit</a>
        </div>
    </div>

    <div style="text-align:center;margin-top:24px">
        <a href="landing.html" style="font-size:.82rem;color:var(--muted);text-decoration:none;display:inline-flex;align-items:center;gap:6px">
            <i data-lucide="arrow-left" style="width:.9rem;height:.9rem"></i> Retour à l'accueil
        </a>
    </div>
</div>
<script src="/js/global.js"></script>

<script>
// ═══════════════════════════════════════════
// CONFIG SUPABASE
// ═══════════════════════════════════════════
var SUPABASE_URL  = 'https://cwubxwbzzuigctvgdygv.supabase.co';
var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN3dWJ4d2J6enVpZ2N0dmdkeWd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMzI2MTgsImV4cCI6MjA5MzgwODYxOH0.0mwBNo_S5yItQQjq2at9GNRN74ooZRBJIbZGDH9L2uk';
var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);


// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
lucide.createIcons();

var form = document.getElementById('loginForm');
var emailInput = document.getElementById('email');
var passwordInput = document.getElementById('password');
var loginBtn = document.getElementById('loginBtn');
var formAlert = document.getElementById('formAlert');
var rememberCheck = document.getElementById('rememberMe');
var toggleBtn = document.getElementById('togglePassword');
var toggleIcon = document.getElementById('toggleIcon');

// ═══════════════ FONCTIONS ═══════════════
function showMsg(msg, type) {
    formAlert.innerHTML = msg;
    formAlert.className = 'alert ' + (type || 'error');
    formAlert.style.display = 'flex';
}

function hideMsg() {
    formAlert.style.display = 'none';
    formAlert.className = 'alert';
}

// ═══════════════ TOGGLE MOT DE PASSE ═══════════════
toggleBtn.addEventListener('click', function() {
    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleIcon.setAttribute('data-lucide', 'eye-off');
    } else {
        passwordInput.type = 'password';
        toggleIcon.setAttribute('data-lucide', 'eye');
    }
    lucide.createIcons();
});

// ═══════════════ EMAIL MÉMORISÉ ═══════════════
var savedEmail = localStorage.getItem('rememberedEmail');
if (savedEmail) {
    emailInput.value = savedEmail;
    rememberCheck.checked = true;
}

// ═══════════════ SOUMISSION ═══════════════
form.addEventListener('submit', async function(e) {
    e.preventDefault();
    console.log('🚀 Login');
    
    var email = emailInput.value.trim();
    var password = passwordInput.value;
    
    hideMsg();
    
    // Validation
    if (!email || !password) {
        showMsg('Veuillez remplir tous les champs.', 'error');
        return;
    }
    
    if (password.length < 6) {
        showMsg('Mot de passe trop court.', 'error');
        return;
    }
    
    // Loading
    loginBtn.disabled = true;
    loginBtn.textContent = 'Connexion en cours...';
    
    try {
        var { data, error } = await sb.auth.signInWithPassword({
            email: email,
            password: password
        });
        
        if (error) {
            loginBtn.disabled = false;
            loginBtn.textContent = 'Se connecter';
            
            var msg = error.message || '';
            if (msg.indexOf('Invalid login') !== -1 || msg.indexOf('Invalid email') !== -1) {
                showMsg('Email ou mot de passe incorrect.', 'error');
            } else if (msg.indexOf('Email not confirmed') !== -1) {
                showMsg('Email non confirmé. Vérifiez votre boîte mail.', 'error');
            } else if (msg.indexOf('rate limit') !== -1) {
                showMsg('Trop de tentatives. Patientez 60 secondes.', 'error');
            } else {
                showMsg(msg, 'error');
            }
            return;
        }
        
        if (!data || !data.user) {
            loginBtn.disabled = false;
            loginBtn.textContent = 'Se connecter';
            showMsg('Erreur inattendue. Réessayez.', 'error');
            return;
        }
        
        // ✅ SUCCÈS
        console.log('✅ Connecté:', data.user.email);
        
        // Sauvegarder email
        if (rememberCheck.checked) {
            localStorage.setItem('rememberedEmail', email);
        } else {
            localStorage.removeItem('rememberedEmail');
        }
        
        showMsg('✅ Connexion réussie ! Redirection...', 'success');
        
        setTimeout(function() {
            window.location.href = '/dashboard/index.html';
        }, 1500);
        
    } catch (err) {
        console.error('❌', err);
        loginBtn.disabled = false;
        loginBtn.textContent = 'Se connecter';
        showMsg('Erreur de connexion. Vérifiez votre internet.', 'error');
    }
});

// ═══════════════ GOOGLE ═══════════════
document.getElementById('googleBtn').addEventListener('click', async function() {
    hideMsg();
    try {
        var { error } = await sb.auth.signInWithOAuth({
            provider: 'google',
            options: { redirectTo: window.location.origin + '/dashboard/index.html' }
        });
        if (error) showMsg('Erreur Google: ' + error.message, 'error');
    } catch (err) {
        showMsg('Erreur connexion Google.', 'error');
    }
});

// ═══════════════ FACEBOOK ═══════════════
document.getElementById('facebookBtn').addEventListener('click', async function() {
    hideMsg();
    try {
        var { error } = await sb.auth.signInWithOAuth({
            provider: 'facebook',
            options: { redirectTo: window.location.origin + '/dashboard/index.html' }
        });
        if (error) showMsg('Erreur Facebook: ' + error.message, 'error');
    } catch (err) {
        showMsg('Erreur connexion Facebook.', 'error');
    }
});

// ═══════════════ FOCUS ═══════════════
if (!emailInput.value) {
    setTimeout(function() { emailInput.focus(); }, 500);
}

console.log('✅ Login prêt');
</script>
</body>
</html>
