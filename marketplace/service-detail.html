<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détail du service — CamServices</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="../css/global.css">
    <style>
        :root {
            --ink:#1A1714;--ink-2:#2E2A25;--muted:#8A8279;--faint:#C9C2B8;
            --rule:#E8E2DA;--cream:#FAF8F5;--white:#FFFFFF;
            --gold:#C4943E;--gold-light:#D4A94E;--gold-dim:rgba(196,148,62,.08);
            --green:#3D8B5E;--green-light:#F0FDF4;--red:#DC2626;
            --blue:#3B82F6;--blue-light:#EFF6FF;--purple:#8B5CF6;--purple-light:#F5F3FF;
       --ff-body: 'Inter', sans-serif;
    --ff-heading: 'Outfit', sans-serif;            --ease:cubic-bezier(.22,1,.36,1);
            --radius:10px;--radius-lg:16px;--radius-xl:20px;--radius-2xl:24px;
            --shadow:0 4px 20px rgba(26,23,20,.06);
            --shadow-lg:0 12px 40px rgba(26,23,20,.1);
            --max:1200px;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:var(--ff-body);background:var(--cream);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.6;}
        ::selection{background:var(--gold-dim);color:var(--ink);}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        @keyframes toastUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
        @keyframes slideInRight{from{transform:translateX(100%)}to{transform:translateX(0)}}
        @keyframes modalFadeIn{from{opacity:0}to{opacity:1}}
        @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

        /* ═══ NAVBAR ═══ */
        .navbar{position:sticky;top:0;z-index:50;background:rgba(250,248,245,.88);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-bottom:1px solid rgba(232,226,218,.6);padding:0 24px;}
        .navbar-inner{max-width:var(--max);margin:0 auto;height:64px;display:flex;align-items:center;justify-content:space-between;}
        .nav-logo{font-family:var(--ff-display);font-size:1.2rem;color:var(--ink);text-decoration:none;letter-spacing:-.02em;}
        .nav-logo .accent{color:var(--gold);}
        .nav-links{display:flex;align-items:center;gap:6px;}
        .nav-links a{font-size:.82rem;font-weight:500;color:var(--muted);text-decoration:none;transition:all .2s;padding:8px 14px;border-radius:var(--radius);display:flex;align-items:center;gap:6px;}
        .nav-links a:hover{color:var(--ink);background:rgba(26,23,20,.03);}
        .nav-links a i{width:.9rem;height:.9rem;}
        .cart-count{background:var(--gold);color:var(--white);font-size:.6rem;font-weight:700;padding:2px 7px;border-radius:10px;min-width:18px;text-align:center;}
        .btn-nav{background:var(--ink);color:var(--white)!important;padding:8px 16px;border-radius:var(--radius);font-weight:600!important;}
        .btn-nav:hover{background:var(--ink-2)!important;}

        /* ═══ DETAIL HERO ═══ */
        .detail-hero{background:var(--white);border-bottom:1px solid var(--rule);padding:36px 24px;position:relative;overflow:hidden;}
        .detail-hero::before{content:'';position:absolute;top:-100px;right:-80px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,var(--gold-dim) 0%,transparent 70%);pointer-events:none;}
        .detail-hero-inner{max-width:var(--max);margin:0 auto;position:relative;z-index:1;}
        .breadcrumb{display:flex;align-items:center;gap:8px;font-size:.76rem;color:var(--muted);margin-bottom:18px;flex-wrap:wrap;}
        .breadcrumb a{color:var(--muted);text-decoration:none;transition:color .2s;}
        .breadcrumb a:hover{color:var(--gold);}
        .breadcrumb span{color:var(--faint);}
        .detail-header{max-width:680px;}
        .detail-category-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;background:var(--gold-dim);color:var(--gold);font-size:.73rem;font-weight:600;margin-bottom:12px;}
        .detail-title{font-family:var(--ff-display);font-weight:400;font-size:clamp(1.5rem,3vw,2.1rem);letter-spacing:-.02em;margin-bottom:10px;line-height:1.2;}
        .detail-price{font-family:var(--ff-display);font-size:1.35rem;color:var(--gold);}
        .detail-price .price-type{font-family:var(--ff-body);font-size:.78rem;font-weight:500;color:var(--muted);margin-left:6px;}

        /* ═══ LAYOUT ═══ */
        .detail-layout{max-width:var(--max);margin:0 auto;padding:28px 24px;display:grid;grid-template-columns:1fr 340px;gap:24px;align-items:start;}
        .detail-main{display:flex;flex-direction:column;gap:20px;}

        /* ═══ CARDS ═══ */
        .detail-card{background:var(--white);border:1px solid var(--rule);border-radius:var(--radius-lg);padding:24px;animation:fadeUp .45s var(--ease);}
        .detail-section-title{display:flex;align-items:center;gap:10px;font-size:.95rem;font-weight:700;margin-bottom:16px;letter-spacing:-.02em;}
        .detail-section-title i{width:1.05rem;height:1.05rem;color:var(--gold);}
        .detail-description{font-size:.86rem;color:var(--ink-2);line-height:1.8;white-space:pre-line;}
        .detail-info-row{display:flex;gap:18px;flex-wrap:wrap;margin-top:18px;padding-top:16px;border-top:1px solid var(--rule);}
        .detail-info-item{flex:1;min-width:110px;}
        .detail-info-label{display:block;font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:3px;}
        .detail-info-value{font-size:.85rem;font-weight:600;color:var(--ink);}

        /* ═══ PROVIDER ═══ */
        .provider-profile{display:flex;gap:18px;align-items:flex-start;}
        .provider-avatar-lg{width:68px;height:68px;border-radius:var(--radius-lg);background:var(--cream);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:2px solid var(--rule);}
        .provider-avatar-lg img{width:100%;height:100%;object-fit:cover;}
        .provider-avatar-initials{font-size:1.3rem;font-weight:700;color:var(--faint);}
        .provider-details{flex:1;}
        .provider-name{font-weight:700;font-size:1rem;display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:3px;}
        .verified-badge{display:inline-flex;align-items:center;gap:4px;font-size:.66rem;font-weight:600;color:var(--green);background:var(--green-light);padding:3px 10px;border-radius:20px;}
        .verified-badge i{width:.7rem;height:.7rem;}
        .provider-location{font-size:.8rem;color:var(--muted);display:flex;align-items:center;gap:5px;margin-bottom:5px;}
        .provider-location i{width:.8rem;height:.8rem;}
        .provider-bio{font-size:.8rem;color:var(--ink-2);line-height:1.65;margin-bottom:8px;}
        .expertise-tags{display:flex;flex-wrap:wrap;gap:5px;}
        .expertise-tag{font-size:.68rem;padding:4px 10px;border-radius:6px;background:var(--gold-dim);color:var(--gold);font-weight:600;}

        /* ═══ STATS ═══ */
        .stats-mini{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:16px;padding-top:16px;border-top:1px solid var(--rule);}
        .stat-mini{text-align:center;padding:10px 6px;background:var(--cream);border-radius:var(--radius);border:1px solid var(--rule);transition:border-color .2s;}
        .stat-mini:hover{border-color:var(--gold);}
        .stat-mini-value{font-family:var(--ff-display);font-size:1.05rem;color:var(--ink);margin-bottom:1px;}
        .stat-mini-label{font-size:.62rem;color:var(--muted);font-weight:500;}

        /* ═══ PRICING ═══ */
        .pricing-list{display:flex;flex-direction:column;gap:10px;}
        .pricing-item{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--cream);border:1px solid var(--rule);border-radius:var(--radius);transition:all .2s;}
        .pricing-item:hover{border-color:var(--gold);background:var(--white);}
        .pricing-item-info{flex:1;}
        .pricing-item-name{font-weight:700;font-size:.85rem;margin-bottom:2px;}
        .pricing-item-desc{font-size:.73rem;color:var(--muted);}
        .pricing-item-meta{display:flex;align-items:center;gap:7px;margin-top:4px;}
        .pricing-item-tag{font-size:.63rem;padding:2px 8px;border-radius:4px;background:var(--gold-dim);color:var(--gold);font-weight:600;}
        .pricing-item-price{font-family:var(--ff-display);font-size:1rem;color:var(--gold);white-space:nowrap;}

        /* ═══ PORTFOLIO ═══ */
        .portfolio-mini-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
        .portfolio-thumb{border-radius:var(--radius);overflow:hidden;aspect-ratio:1;background:var(--cream);border:1px solid var(--rule);cursor:pointer;position:relative;transition:all .25s;}
        .portfolio-thumb:hover{border-color:var(--gold);transform:scale(1.03);box-shadow:var(--shadow);}
        .portfolio-thumb img{width:100%;height:100%;object-fit:cover;}
        .portfolio-thumb .featured-dot{position:absolute;top:6px;right:6px;width:8px;height:8px;border-radius:50%;background:var(--gold);border:2px solid var(--white);}

        /* ═══ ACTIVITIES ═══ */
        .activity-timeline{display:flex;flex-direction:column;gap:10px;}
        .activity-item{display:flex;gap:12px;align-items:flex-start;padding:12px 14px;background:var(--cream);border:1px solid var(--rule);border-radius:var(--radius);transition:border-color .2s;}
        .activity-item:hover{border-color:var(--gold);}
        .activity-dot{width:34px;height:34px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
        .activity-dot i{width:.95rem;height:.95rem;}
        .activity-info{flex:1;min-width:0;}
        .activity-title-text{font-weight:700;font-size:.8rem;margin-bottom:2px;}
        .activity-meta{font-size:.7rem;color:var(--muted);display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
        .activity-verified{font-size:.63rem;font-weight:600;padding:2px 8px;border-radius:10px;background:var(--green-light);color:var(--green);display:inline-flex;align-items:center;gap:3px;}

        /* ═══ SIDEBAR ═══ */
        .detail-sidebar{display:flex;flex-direction:column;gap:16px;position:sticky;top:84px;}
        .sidebar-card{background:var(--white);border:1px solid var(--rule);border-radius:var(--radius-lg);padding:22px;animation:fadeUp .45s var(--ease);}
        .sidebar-card-title{font-weight:700;font-size:.88rem;margin-bottom:14px;letter-spacing:-.02em;}
        .action-card{text-align:center;}
        .action-price{font-family:var(--ff-display);font-size:1.7rem;color:var(--ink);margin-bottom:14px;letter-spacing:-.02em;}
        .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 20px;border-radius:var(--radius);font-family:var(--ff-body);font-size:.82rem;font-weight:600;cursor:pointer;transition:all .25s var(--ease);border:none;text-decoration:none;}
        .btn-block{display:flex;width:100%;margin-bottom:8px;}
        .btn-dark{background:var(--ink);color:var(--white);}.btn-dark:hover{background:var(--ink-2);transform:translateY(-1px);box-shadow:0 6px 20px rgba(26,23,20,.15);}
        .btn-whatsapp{background:#25D366;color:var(--white);}.btn-whatsapp:hover{background:#1EBE57;transform:translateY(-1px);}
        .btn-ghost{background:transparent;color:var(--muted);border:1.5px solid var(--rule);}.btn-ghost:hover{border-color:var(--ink);color:var(--ink);}
        .btn i{width:.95rem;height:.95rem;}
        .related-service-item{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--rule);text-decoration:none;color:inherit;transition:color .2s;}
        .related-service-item:last-child{border-bottom:none;}
        .related-service-item:hover .related-service-title{color:var(--gold);}
        .related-service-title{font-weight:600;font-size:.8rem;transition:color .2s;}
        .related-service-price{font-size:.76rem;color:var(--gold);font-weight:700;margin-top:2px;}

        .status-badge{display:inline-flex;align-items:center;padding:4px 12px;border-radius:20px;font-size:.7rem;font-weight:600;}
        .status-active{background:var(--green-light);color:var(--green);}
        .status-inactive{background:#FEF2F2;color:var(--red);}

        .empty-section{text-align:center;padding:20px;color:var(--faint);font-size:.8rem;}
        .empty-section i{width:1.8rem;height:1.8rem;margin-bottom:6px;display:block;margin-left:auto;margin-right:auto;}

        /* ═══ AUTH MODAL ═══ */
        .auth-modal-overlay{position:fixed;inset:0;z-index:9800;background:rgba(26,23,20,.55);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:20px;animation:modalFadeIn .25s ease;}
        .auth-modal{background:var(--white);border-radius:var(--radius-2xl);padding:32px 28px;max-width:420px;width:100%;text-align:center;box-shadow:var(--shadow-lg);animation:fadeUp .35s var(--ease);}
        .auth-modal-icon{width:64px;height:64px;border-radius:50%;background:var(--gold-dim);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:var(--gold);}
        .auth-modal-icon i{width:1.8rem;height:1.8rem;}
        .auth-modal h3{font-family:var(--ff-display);font-weight:400;font-size:1.25rem;margin-bottom:8px;letter-spacing:-.02em;}
        .auth-modal p{color:var(--muted);font-size:.85rem;margin-bottom:22px;line-height:1.55;}
        .auth-modal-actions{display:flex;flex-direction:column;gap:8px;}

        /* ═══ SKELETON ═══ */
        .skeleton-block{border-radius:var(--radius);background:linear-gradient(90deg,var(--rule) 25%,var(--cream) 50%,var(--rule) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;}

        /* ═══ RESPONSIVE ═══ */
        @media(max-width:900px){
            .detail-layout{grid-template-columns:1fr;padding:18px;}
            .detail-sidebar{position:static;}
            .detail-hero{padding:24px 18px;}
            .stats-mini{grid-template-columns:repeat(2,1fr);}
            .portfolio-mini-grid{grid-template-columns:repeat(2,1fr);}
            .provider-profile{flex-direction:column;align-items:center;text-align:center;}
            .expertise-tags{justify-content:center;}
        }
        @media(max-width:500px){
            .navbar{padding:0 16px;}
            .nav-links{gap:4px;}
            .nav-links a{padding:8px 10px;font-size:.78rem;}
            .detail-layout{padding:14px;}
            .detail-card{padding:18px;}
        }
    </style>
</head>
<body>

<!-- ═══ NAVBAR ═══ -->
<nav class="navbar">
    <div class="navbar-inner">
<a href="landing.html" class="nav-logo">
 <img src="../asset/logo camservices.svg" alt="CamServices" class="logo-img"></a>
        <div class="nav-links">
            <a href="services.html">Services</a>
            <a href="cart.html"><i data-lucide="shopping-cart"></i> Panier <span id="cartCountNav" class="cart-count" style="display:none">0</span></a>
            <a href="login-client.html" class="btn-nav" id="navLogin">Connexion</a>
        </div>
    </div>
</nav>

<!-- ═══ CONTENU ═══ -->
<div id="service-detail">
    <div style="text-align:center;padding:80px">
        <div style="width:32px;height:32px;border:2.5px solid var(--rule);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px"></div>
        <p style="color:var(--muted);font-size:.88rem">Chargement du service...</p>
    </div>
</div>

<!-- ═══ SCRIPTS ═══ -->
<script src="../js/global.js"></script>
<script>
const SUPABASE_URL  = 'https://cwubxwbzzuigctvgdygv.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN3dWJ4d2J6enVpZ2N0dmdkeWd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMzI2MTgsImV4cCI6MjA5MzgwODYxOH0.0mwBNo_S5yItQQjq2at9GNRN74ooZRBJIbZGDH9L2uk';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

var _currentService = null;
var _currentProvider = null;
var _relatedServices = [];
var _providerStats = null;
var _providerPricing = [];
var _providerPortfolio = [];
var _providerActivities = [];
var _isUserLoggedIn = false;

document.addEventListener('DOMContentLoaded', function() {
    lucide.createIcons();
    checkAuthStatus();
    loadServiceDetail();
});

// ═══ AUTHENTIFICATION ═══
async function checkAuthStatus() {
    var { data } = await sb.auth.getSession();
    _isUserLoggedIn = !!(data.session);
    var btn = document.getElementById('navLogin');
    if (_isUserLoggedIn && btn) {
        btn.textContent = 'Mon compte';
        btn.href = 'login-client.html';
    }
}

async function requireAuth(actionLabel) {
    var { data } = await sb.auth.getSession();
    if (data.session) { _isUserLoggedIn = true; return true; }
    _isUserLoggedIn = false;
    showAuthModal(actionLabel);
    return false;
}

function showAuthModal(actionLabel) {
    var existing = document.getElementById('authModalOverlay');
    if (existing) existing.remove();

    var overlay = document.createElement('div');
    overlay.id = 'authModalOverlay';
    overlay.className = 'auth-modal-overlay';
    overlay.onclick = function(e) { if (e.target === overlay) overlay.remove(); };

    // Sauvegarde de l'URL courante pour redirection après login
    localStorage.setItem('camservices_redirect_url', window.location.href);

    overlay.innerHTML =
        '<div class="auth-modal">'
        + '<div class="auth-modal-icon"><i data-lucide="lock"></i></div>'
        + '<h3>Connexion requise</h3>'
        + '<p>Vous devez vous connecter pour ' + (actionLabel || 'continuer') + '. Connectez-vous ou créez un compte gratuitement en quelques secondes.</p>'
        + '<div class="auth-modal-actions">'
        + '<a href="login-client.html" class="btn btn-dark btn-block"><i data-lucide="log-in"></i> Se connecter</a>'
        + '<a href="signup-client.html" class="btn btn-ghost btn-block"><i data-lucide="user-plus"></i> Créer un compte</a>'
        + '<button onclick="document.getElementById(\'authModalOverlay\').remove()" style="background:none;border:none;color:var(--muted);font-size:.78rem;margin-top:6px;cursor:pointer;padding:6px;text-decoration:underline">Plus tard</button>'
        + '</div>'
        + '</div>';

    document.body.appendChild(overlay);
    lucide.createIcons();
}

function getServiceId() {
    return new URLSearchParams(window.location.search).get('id');
}

async function loadServiceDetail() {
    var serviceId = getServiceId();
    var container = document.getElementById('service-detail');

    if (!serviceId) {
        container.innerHTML = renderEmptyState('Aucun service spécifié.', 'search-x');
        return;
    }

    container.innerHTML = renderLoading();

    try {
        var { data: service, error } = await sb
            .from('services')
            .select('*, provider:user_id(id, full_name, phone, email, city, neighborhood, profile_photo_url, is_verified, bio, domain_expertise, education, side_activities, employment_status, created_at)')
            .eq('id', serviceId)
            .single();

        if (error) throw error;
        if (!service) { container.innerHTML = renderEmptyState('Service introuvable.', 'package-x'); return; }

        _currentService = service;
        _currentProvider = service.provider || {};

        var providerId = _currentProvider.id;

        var [relRes, statsRes, pricingRes, portfolioRes, activitiesRes] = await Promise.all([
            sb.from('services')
              .select('*, provider:user_id(id, full_name, city, profile_photo_url, is_verified)')
              .eq('category', service.category).eq('is_active', true).neq('id', serviceId).limit(3),
            providerId ? sb.from('provider_stats').select('*').eq('provider_id', providerId).maybeSingle() : { data: null },
            providerId ? sb.from('pricing_grid').select('*').eq('user_id', providerId).eq('is_active', true).order('base_price') : { data: [] },
            providerId ? sb.from('portfolio_items').select('*').eq('user_id', providerId).order('is_featured', { ascending: false }).order('display_order').limit(9) : { data: [] },
            providerId ? sb.from('provider_activities').select('*').eq('user_id', providerId).order('date_start', { ascending: false, nullsFirst: false }).limit(5) : { data: [] }
        ]);

        _relatedServices = (relRes.data || []).filter(function(s) { return s.provider !== null; });
        _providerStats = statsRes.data || null;
        _providerPricing = pricingRes.data || [];
        _providerPortfolio = portfolioRes.data || [];
        _providerActivities = activitiesRes.data || [];

        recordProfileView();
        renderServiceDetail();

    } catch (err) {
        console.error('Erreur chargement service:', err);
        container.innerHTML = renderEmptyState('Erreur : ' + err.message, 'alert-triangle');
    }
}

async function recordProfileView() {
    if (!_currentProvider.id) return;
    try {
        var { data: session } = await sb.auth.getSession();
        await sb.from('profile_views').insert({
            provider_id: _currentProvider.id,
            viewer_id: session && session.session ? session.session.user.id : null,
            user_agent: navigator.userAgent
        });
    } catch (err) { /* silencieux */ }
}

function renderServiceDetail() {
    var container = document.getElementById('service-detail');
    var s = _currentService;
    var p = _currentProvider;

    var phone = (p.phone || '').replace(/\s+/g, '').replace('+', '');
    var whatsappUrl = 'https://wa.me/' + phone + '?text=' + encodeURIComponent('Bonjour, je suis intéressé par votre service "' + s.title + '" sur CamServices.');
    var initials = (p.full_name || '?').split(' ').map(function(n) { return n[0]; }).join('').substring(0, 2).toUpperCase();

    var categoryEmojis = {
        'Plomberie':'🔧','Électricité':'⚡','Ménage':'🏠','Photographie':'📸',
        'Développement web':'💻','Cours particuliers':'📚','Transport':'🚗',
        'Design':'🎨','Beauté':'💄','Bâtiment':'🏗️'
    };

    var html = '';

// ═══ LIGHTBOX ═══
function showPortfolioLightbox(index) {
    var item = _providerPortfolio[index];
    if (!item) return;

    var overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;padding:24px;cursor:pointer;animation:fadeUp .25s ease;backdrop-filter:blur(8px)';
    overlay.onclick = function() { overlay.remove(); };

    var inner = '<div style="max-width:680px;width:100%;text-align:center" onclick="event.stopPropagation()">';
    if (item.media_type === 'video') {
        inner += '<video src="' + escapeHtml(item.media_url) + '" controls style="max-width:100%;max-height:70vh;border-radius:14px"></video>';
    } else {
        inner += '<img src="' + escapeHtml(item.media_url) + '" alt="' + escapeHtml(item.title) + '" style="max-width:100%;max-height:70vh;border-radius:14px;object-fit:contain">';
    }
    inner += '<div style="color:white;margin-top:14px">';
    inner += '<h3 style="font-weight:700;font-size:.95rem;margin-bottom:3px">' + escapeHtml(item.title) + '</h3>';
    if (item.description) inner += '<p style="font-size:.8rem;color:rgba(255,255,255,.65)">' + escapeHtml(item.description) + '</p>';
    if (item.tags && item.tags.length) {
        inner += '<div style="display:flex;gap:5px;justify-content:center;margin-top:8px;flex-wrap:wrap">';
        for (var t = 0; t < item.tags.length; t++) {
            inner += '<span style="font-size:.66rem;padding:3px 8px;border-radius:4px;background:rgba(255,255,255,.12);color:rgba(255,255,255,.75)">' + escapeHtml(item.tags[t]) + '</span>';
        }
        inner += '</div>';
    }
    inner += '</div></div>';

    overlay.innerHTML = inner;
    document.body.appendChild(overlay);
    document.addEventListener('keydown', function handler(e) {
        if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', handler); }
    });
}

// ═══ CART (avec auth obligatoire) ═══
async function handleAddToCart() {
    if (!_currentService) { showToast('Service non disponible.', 'error'); return; }

    // ⚠️ Vérification de connexion OBLIGATOIRE
    var isAuth = await requireAuth('ajouter ce service à votre panier');
    if (!isAuth) return;

    var cart = JSON.parse(localStorage.getItem('camservices_cart') || '[]');
    for (var i = 0; i < cart.length; i++) {
        if (cart[i].serviceId === _currentService.id) {
            showToast('Ce service est déjà dans votre panier.', 'info');
            openCartDrawer();
            return;
        }
    }
    cart.push({
        serviceId: _currentService.id,
        title: _currentService.title,
        price: _currentService.price,
        category: _currentService.category || '',
        providerName: _currentProvider.full_name || 'Inconnu',
        providerId: _currentProvider.id,
        addedAt: new Date().toISOString()
    });
    localStorage.setItem('camservices_cart', JSON.stringify(cart));
    updateNavCartCount();
    showToast('Service ajouté au panier !', 'success');
}

async function removeFromCart(serviceId) {
    var isAuth = await requireAuth('gérer votre panier');
    if (!isAuth) return;

    var cart = JSON.parse(localStorage.getItem('camservices_cart') || '[]');
    cart = cart.filter(function(item) { return item.serviceId !== serviceId; });
    localStorage.setItem('camservices_cart', JSON.stringify(cart));
    updateNavCartCount();
    openCartDrawer();
}

function clearCart() {
    localStorage.removeItem('camservices_cart');
    updateNavCartCount();
    openCartDrawer();
}

async function openCartDrawer() {
    // ⚠️ Vérification de connexion OBLIGATOIRE pour ouvrir le panier
    var isAuth = await requireAuth('consulter votre panier');
    if (!isAuth) return;

    var old = document.getElementById('cartDrawerOverlay');
    if (old) old.remove();
    var cart = JSON.parse(localStorage.getItem('camservices_cart') || '[]');
    var total = cart.reduce(function(sum, item) { return sum + (item.price || 0); }, 0);

    var overlay = document.createElement('div');

    var h = '<div id="cartDrawer" style="position:fixed;top:0;right:0;bottom:0;width:400px;max-width:100vw;background:var(--white);box-shadow:-6px 0 32px rgba(26,23,20,.12);display:flex;flex-direction:column;z-index:9501;animation:slideInRight .3s cubic-bezier(.22,1,.36,1)">';

    h += '<button onclick="closeCartDrawer()" style="background:none;border:none;cursor:pointer;color:var(--muted);padding:6px"><i data-lucide="x" style="width:1.1rem;height:1.1rem"></i></button>';
    h += '</div>';

    h += '<div style="flex:1;overflow-y:auto;padding:18px 22px">';
    if (cart.length === 0) {
        h += '<div style="text-align:center;padding:44px 0;color:var(--faint)"><i data-lucide="shopping-bag" style="width:2.5rem;height:2.5rem;margin-bottom:10px;display:block;margin-left:auto;margin-right:auto"></i><p style="font-size:.85rem;font-weight:600;color:var(--muted);margin-bottom:4px">Votre panier est vide</p><p style="font-size:.76rem;color:var(--faint)">Parcourez les services et ajoutez-en</p></div>';
    } else {
        for (var i = 0; i < cart.length; i++) {
            var item = cart[i];
            h += '<div style="display:flex;gap:12px;align-items:flex-start;padding:14px 0;' + (i > 0 ? 'border-top:1px solid var(--rule)' : '') + '">';
            h += '<div style="width:40px;height:40px;border-radius:var(--radius);background:var(--gold-dim);display:flex;align-items:center;justify-content:center;flex-shrink:0"><i data-lucide="briefcase" style="width:1rem;height:1rem;color:var(--gold)"></i></div>';
            h += '<div style="flex:1;min-width:0"><div style="font-weight:700;font-size:.82rem;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + escapeHtml(item.title) + '</div><div style="font-size:.73rem;color:var(--muted)">' + escapeHtml(item.providerName) + '</div><div style="font-weight:800;font-size:.85rem;color:var(--gold);margin-top:3px">' + formatPrice(item.price) + '</div></div>';
            h += '<button onclick="removeFromCart(\'' + item.serviceId + '\')" style="background:none;border:none;cursor:pointer;color:var(--faint);padding:4px;transition:color .2s" onmouseover="this.style.color=\'var(--red)\'" onmouseout="this.style.color=\'var(--faint)\'"><i data-lucide="trash-2" style="width:.85rem;height:.85rem"></i></button>';
            h += '</div>';
        }
    }
    h += '</div>';

    if (cart.length > 0) {
        h += '<div style="padding:18px 22px;border-top:1px solid var(--rule);background:var(--cream)">';
        h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><span style="font-size:.82rem;font-weight:600;color:var(--muted)">Total</span><span style="font-family:var(--ff-display);font-size:1.15rem;color:var(--ink)">' + formatPrice(total) + '</span></div>';
        h += '<button onclick="handleCheckout()" class="btn btn-dark btn-block" style="margin-bottom:6px"><i data-lucide="credit-card"></i> Passer commande</button>';
        h += '<button onclick="clearCart()" style="width:100%;padding:9px;background:none;border:1px solid var(--rule);border-radius:var(--radius);font-family:var(--ff-body);font-size:.76rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all .2s" onmouseover="this.style.borderColor=\'var(--red)\';this.style.color=\'var(--red)\'" onmouseout="this.style.borderColor=\'var(--rule)\';this.style.color=\'var(--muted)\'">Vider le panier</button>';
        h += '</div>';
    }

    h += '</div>';
    overlay.innerHTML = h;
    document.body.appendChild(overlay);
    document.body.style.overflow = 'hidden';
    lucide.createIcons();
}

function closeCartDrawer() {
    var overlay = document.getElementById('cartDrawerOverlay');
    if (overlay) overlay.remove();
    document.body.style.overflow = '';
}

async function handleCheckout() {
    // ⚠️ Vérification de connexion OBLIGATOIRE
    var isAuth = await requireAuth('passer une commande');
    if (!isAuth) return;

    closeCartDrawer();
    showToast('Redirection vers le panier...', 'info');
    setTimeout(function() { window.location.href = 'cart.html'; }, 800);
}

// ═══ HELPERS ═══
function escapeHtml(text) { var d = document.createElement('div'); d.textContent = text || ''; return d.innerHTML; }
function formatPrice(price) { return new Intl.NumberFormat('fr-FR', { style:'currency', currency:'XAF', maximumFractionDigits:0 }).format(price || 0); }
function formatPricingType(type) { return ({ fixed:'Prix fixe', hourly:'Taux horaire', daily:'À la journée', project:'Par projet' })[type] || type; }
function formatPricingTypeDetail(type) { return ({ fixed:'Forfait', hourly:'Horaire', half_day:'Demi-journée', full_day:'Journée', per_person:'Par pers.', custom:'Sur mesure' })[type] || type; }
function formatDateRange(start, end) {
    if (!start) return '';
    var s = new Date(start).toLocaleDateString('fr-FR', { month:'short', year:'numeric' });
    if (!end) return s;
    return s + ' — ' + new Date(end).toLocaleDateString('fr-FR', { month:'short', year:'numeric' });
}
function getActivityTypeConfig(type) {
    var c = {
        certification:  { icon:'certificate',    label:'Certification',  color:'var(--gold)',  bg:'var(--gold-dim)' },
        training:       { icon:'graduation-cap', label:'Formation',      color:'var(--blue)',  bg:'var(--blue-light)' },
        event:          { icon:'calendar-check', label:'Événement',      color:'var(--purple)', bg:'var(--purple-light)' },
        collaboration:  { icon:'users',          label:'Collaboration',  color:'var(--green)', bg:'var(--green-light)' },
        award:          { icon:'trophy',         label:'Récompense',     color:'#F59E0B',      bg:'#FFFBEB' },
        other:          { icon:'star',           label:'Autre',          color:'var(--muted)', bg:'var(--cream)' }
    };
    return c[type] || c.other;
}
function showToast(msg, type) {
    var existing = document.querySelector('.toast-notification');
    if (existing) existing.remove();
    var colors = { success:'#3D8B5E', error:'#DC2626', info:'#1A1714' };
    var icons  = { success:'check-circle', error:'x-circle', info:'info' };
    var toast = document.createElement('div');
    toast.className = 'toast-notification';
    toast.style.cssText = 'position:fixed;bottom:24px;right:24px;z-index:9999;background:' + (colors[type] || colors.info) + ';color:white;padding:13px 20px;border-radius:var(--radius-lg);font-weight:600;font-size:.82rem;box-shadow:0 8px 28px rgba(0,0,0,.18);display:flex;align-items:center;gap:10px;font-family:var(--ff-body);animation:toastUp .3s ease';
    toast.innerHTML = '<i data-lucide="' + (icons[type] || 'info') + '" style="width:1.1rem;height:1.1rem"></i> ' + msg;
    document.body.appendChild(toast);
    lucide.createIcons();
    setTimeout(function() { toast.style.opacity='0'; toast.style.transform='translateY(16px)'; toast.style.transition='all .3s ease'; setTimeout(function(){ toast.remove(); }, 300); }, 3500);
}
function renderLoading() {
    return '<div style="text-align:center;padding:80px"><div style="width:32px;height:32px;border:2.5px solid var(--rule);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px"></div><p style="color:var(--muted);font-size:.85rem">Chargement du service...</p></div>';
}
function renderEmptyState(msg, icon) {
    return '<div style="text-align:center;padding:80px"><i data-lucide="' + (icon || 'search-x') + '" style="width:3.5rem;height:3.5rem;color:var(--faint);margin-bottom:12px"></i><p style="color:var(--muted);font-size:.88rem">' + msg + '</p><a href="services.html" style="display:inline-flex;align-items:center;gap:6px;margin-top:16px;padding:10px 20px;background:var(--ink);color:white;border-radius:var(--radius);text-decoration:none;font-weight:600;font-size:.82rem"><i data-lucide="arrow-left" style="width:.9rem;height:.9rem"></i> Retour aux services</a></div>';
}
function updateNavCartCount() {
    var cart = JSON.parse(localStorage.getItem('camservices_cart') || '[]');
    var el = document.getElementById('cartCountNav');
    if (el) { el.textContent = cart.length; el.style.display = cart.length > 0 ? 'inline' : 'none'; }
}
updateNavCartCount();
</script>
