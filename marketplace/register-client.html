<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription Client — CamServices</title>
    <link href="https://fonts.googleapis.com/css2?family=Allison&family=Outfit:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <link rel="stylesheet" href="../css/global.css">
    <style>
        :root {
            --ink: #1A1714; --ink-2: #2E2A25; --muted: #8A8279; --faint: #C9C2B8;
            --rule: #E8E2DA; --cream: #FAF8F5; --white: #FFFFFF;
            --gold: #C4943E; --gold-light: #D4A94E; --gold-dim: rgba(196,148,62,.08);
            --green: #3D8B5E; --green-light: #F0FDF4; --red: #DC2626; --red-light: #FEF2F2;
--ff-body: 'Outfit';
    --ff-script: 'Outfit'; 
    --radius: 10px; --radius-xl: 24px; --shadow-lg: 0 20px 60px rgba(26,23,20,.1);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--ff-body); background: var(--cream); color: var(--ink);
            min-height: 100vh; display:flex; align-items:center; justify-content:center;
            padding:24px; -webkit-font-smoothing:antialiased;
        }
        .auth-container { width:100%; max-width:480px; }
        .auth-card { background:var(--white); border:1px solid var(--rule); border-radius:var(--radius-xl); box-shadow:var(--shadow-lg); overflow:hidden; }
        .auth-header { padding:40px 36px 32px; text-align:center; border-bottom:1px solid var(--rule); }
        .auth-logo { font-weight:700; font-size:1.2rem; color:var(--ink); text-decoration:none; display:inline-block; margin-bottom:12px; }
        .auth-logo .script { font-family:var(--ff-script); font-size:2.2rem; color:var(--gold); position:relative; top:3px; }
        .auth-header h1 { font-weight:800; font-size:1.4rem; letter-spacing:-.03em; margin-bottom:4px; }
        .auth-header p { font-size:.85rem; color:var(--muted); font-weight:300; }
        .auth-body { padding:32px 36px 36px; }
        .form-group { margin-bottom:18px; }
        .form-group label { display:block; font-size:.76rem; font-weight:600; color:var(--ink); margin-bottom:6px; }
        .form-group label .req { color:var(--red); }
        .input-wrap { position:relative; }
        .input-wrap input {
            width:100%; padding:11px 14px 11px 40px; border:1.5px solid var(--rule);
            border-radius:var(--radius); font-family:var(--ff-body); font-size:.88rem;
            color:var(--ink); outline:none; transition:all .2s; background:var(--white);
        }
        .input-wrap input:focus { border-color:var(--gold); box-shadow:0 0 0 3px var(--gold-dim); }
        .input-wrap .input-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--faint); }
        .form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
        .alert { padding:12px 14px; border-radius:var(--radius); font-size:.8rem; margin-bottom:16px; display:none; align-items:center; gap:8px; font-weight:500; }
        .alert.error { background:var(--red-light); color:var(--red); display:flex; }
        .alert.success { background:var(--green-light); color:var(--green); display:flex; }
        .btn {
            display:inline-flex; align-items:center; justify-content:center; gap:8px;
            font-family:var(--ff-body); font-weight:600; font-size:.88rem; padding:13px 24px;
            border-radius:var(--radius); border:none; cursor:pointer; width:100%; transition:all .3s;
        }
        .btn-dark { background:var(--ink); color:var(--white); }
        .btn-dark:hover { background:var(--ink-2); transform:translateY(-1px); }
        .btn-dark:disabled { opacity:.5; cursor:not-allowed; }
        .divider { display:flex; align-items:center; gap:14px; margin:24px 0; }
        .divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--rule); }
        .divider span { font-size:.7rem; color:var(--faint); text-transform:uppercase; letter-spacing:.08em; }
        .social-btn {
            display:flex; align-items:center; justify-content:center; gap:10px;
            padding:12px; border:1.5px solid var(--rule); border-radius:var(--radius);
            background:var(--white); font-family:var(--ff-body); font-weight:500;
            font-size:.85rem; color:var(--ink); cursor:pointer; width:100%; transition:all .2s;
        }
        .social-btn:hover { background:var(--cream); border-color:var(--gold); }
        .auth-footer { text-align:center; padding:20px 36px; border-top:1px solid var(--rule); font-size:.8rem; color:var(--muted); }
        .auth-footer a { color:var(--gold); font-weight:600; text-decoration:none; }
        @media (max-width:500px) {
            .auth-header { padding:28px 20px 24px; }
            .auth-body { padding:24px 20px 28px; }
            .form-row { grid-template-columns:1fr; }
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <a href="landing.html" class="auth-logo">Cam<span class="script">S</span>ervices</a>
            <h1>Créez votre compte client</h1>
            <p>Trouvez et réservez des services en quelques clics</p>
        </div>
        <div class="auth-body">
            <div class="alert" id="formAlert"></div>

            <form id="registerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Nom complet <span class="req">*</span></label>
                        <div class="input-wrap">
                            <i data-lucide="user" class="input-icon" style="width:1rem;height:1rem"></i>
                            <input type="text" name="full_name" placeholder="Jean Dupont" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Téléphone <span class="req">*</span></label>
                        <div class="input-wrap">
                            <i data-lucide="phone" class="input-icon" style="width:1rem;height:1rem"></i>
                            <input type="tel" name="phone" placeholder="+237 6XX XXX XXX" required>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Ville</label>
                    <div class="input-wrap">
                        <i data-lucide="map-pin" class="input-icon" style="width:1rem;height:1rem"></i>
                        <input type="text" name="city" placeholder="Ex: Yaoundé, Douala...">
                    </div>
                </div>
                <div class="form-group">
                    <label>Email <span class="req">*</span></label>
                    <div class="input-wrap">
                        <i data-lucide="mail" class="input-icon" style="width:1rem;height:1rem"></i>
                        <input type="email" name="email" placeholder="jean@email.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Mot de passe <span class="req">*</span></label>
                    <div class="input-wrap">
                        <i data-lucide="lock" class="input-icon" style="width:1rem;height:1rem"></i>
                        <input type="password" name="password" placeholder="Min. 8 caractères" required minlength="8">
                    </div>
                </div>
                <button type="submit" class="btn btn-dark" id="submitBtn">Créer mon compte</button>
            </form>

            <div class="divider"><span>ou</span></div>

            <button class="social-btn" onclick="loginWithGoogle()">
                <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1Z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23Z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62Z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53Z" fill="#EA4335"/></svg>
                Continuer avec Google
            </button>
        </div>
        <div class="auth-footer">
            Déjà un compte ? <a href="login-client.html">Connectez-vous</a>
        </div>
    </div>
</div>
<script src="../js/global.js"></script>

<script>
     var SUPABASE_URL  = 'https://cwubxwbzzuigctvgdygv.supabase.co';
var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN3dWJ4d2J6enVpZ2N0dmdkeWd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMzI2MTgsImV4cCI6MjA5MzgwODYxOH0.0mwBNo_S5yItQQjq2at9GNRN74ooZRBJIbZGDH9L2uk';

  
    var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
    lucide.createIcons();

    function showAlert(msg, type) {
        var a = document.getElementById('formAlert');
        a.innerHTML = '<i data-lucide="'+(type==='error'?'alert-circle':'check-circle')+'" style="width:1rem;height:1rem"></i> '+msg;
        a.className = 'alert '+type; a.style.display='flex'; lucide.createIcons();
    }

    // ═══════════════ INSCRIPTION ═══════════════
    // ═══════════════ INSCRIPTION ═══════════════
document.getElementById('registerForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    var btn = document.getElementById('submitBtn');
    var fd = new FormData(this);
    var data = {};
    for (var pair of fd.entries()) data[pair[0]] = pair[1].trim();

    if (!data.full_name || !data.phone || !data.email || !data.password) {
        showAlert('Veuillez remplir tous les champs obligatoires.', 'error'); return;
    }
    if (data.password.length < 8) { 
        showAlert('Mot de passe : 8 caractères minimum.', 'error'); return; 
    }

    btn.disabled = true; 
    btn.innerHTML = 'Création en cours...';

    try {
        console.log('📝 Inscription:', { email: data.email, full_name: data.full_name });

        // Étape 1 : Créer le compte Auth
        var { data: authData, error: authError } = await sb.auth.signUp({
            email: data.email,
            password: data.password,
            options: {
                data: {
                    full_name: data.full_name,
                    phone: data.phone,
                    city: data.city || '',
                    role: 'client'
                }
            }
        });

        if (authError) {
            if (authError.message.indexOf('already registered') !== -1) {
                throw new Error('Cet email est déjà utilisé. Essayez de vous connecter.');
            }
            throw new Error(authError.message);
        }

        if (!authData.user) {
            throw new Error('Aucun utilisateur créé.');
        }

        console.log('✅ Compte Auth créé:', authData.user.id);

        // Étape 2 : Insérer dans users_clients
        var clientData = {
            auth_id: authData.user.id,
            full_name: data.full_name,
            phone: data.phone,
            email: data.email,
            city: data.city || null,
            status: 'active'
        };

        var { error: insertError } = await sb
            .from('users_clients')
            .upsert(clientData, { onConflict: 'email' });

        if (insertError) {
            console.warn('⚠️ Insertion client:', insertError.message);
        } else {
            console.log('✅ Client stocké dans users_clients');
        }

        // ✅ REDIRECTION VERS LOGIN (pas services.html)
        showAlert('✅ Compte créé avec succès ! Redirection vers la connexion...', 'success');
        
        setTimeout(function() {
            window.location.href = 'login-client.html?registered=true';
        }, 2000);

    } catch (err) {
        console.error('❌', err);
        showAlert(err.message || 'Une erreur est survenue.', 'error');
        btn.disabled = false; 
        btn.innerHTML = 'Créer mon compte';
    }
});

    // ═══════════════ GOOGLE ═══════════════
    async function loginWithGoogle() {
        try {
            var { error } = await sb.auth.signInWithOAuth({
                provider: 'google',
                options: { 
                    redirectTo: window.location.origin + '/marketplace/services.html',
                    queryParams: { access_type: 'offline', prompt: 'consent' }
                }
            });
            if (error) showAlert('Erreur Google: ' + error.message, 'error');
        } catch(err) { showAlert('Erreur connexion Google.', 'error'); }
    }

    // Animation spin
    var style = document.createElement('style');
    style.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
    document.head.appendChild(style);
</script>
</body>
</html>
