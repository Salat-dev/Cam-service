<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion requise — warap</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #22C55E; --primary-hover: #16A34A; --primary-light: #F0FDF4; --primary-dim: rgba(34,197,94,0.08);
            --text-primary: #111827; --text-secondary: #4B5563; --text-muted: #6B7280;
            --background: #FFFFFF; --surface: #F9FAFB; --border: #E5E7EB; --border-light: #F3F4F6;
            --accent: #F59E0B; --error: #EF4444; --error-light: #FEF2F2;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06); --shadow-lg: 0 12px 40px rgba(0,0,0,0.1);
            --radius-sm: 8px; --radius: 12px; --radius-lg: 16px; --radius-xl: 24px;
            --ease: cubic-bezier(0.16, 1, 0.3, 1); --max: 440px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--surface); color: var(--text-primary);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 24px; -webkit-font-smoothing: antialiased; line-height: 1.5;
        }
        @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
        @keyframes spin { to { transform:rotate(360deg); } }

        .auth-container { width: 100%; max-width: var(--max); }
        .auth-card {
            background: #FFFFFF; border: 1px solid var(--border-light);
            border-radius: var(--radius-xl); box-shadow: var(--shadow-lg); overflow: hidden;
            animation: fadeUp 0.4s var(--ease);
        }

        .auth-header { padding: 36px 32px 28px; text-align: center; border-bottom: 1px solid var(--border-light); }
        .auth-logo { display: inline-flex; align-items: center; gap: 6px; text-decoration: none; color: var(--text-primary); font-weight: 700; font-size: 1.2rem; margin-bottom: 16px; }
        .auth-logo img { height: 28px; }
        .auth-header .icon-circle {
            width: 64px; height: 64px; border-radius: 50%; background: var(--primary-dim);
            display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; color: var(--primary);
        }
        .auth-header h1 { font-weight: 800; font-size: 1.4rem; letter-spacing: -0.02em; margin-bottom: 6px; }
        .auth-header p { font-size: 0.875rem; color: var(--text-secondary); }

        .auth-body { padding: 28px 32px 32px; }
        .alert { padding: 12px 14px; border-radius: var(--radius-sm); font-size: 0.8125rem; font-weight: 500; margin-bottom: 20px; display: none; align-items: center; gap: 8px; }
        .alert.error { background: var(--error-light); color: var(--error); display: flex; }
        .alert.success { background: var(--primary-light); color: var(--primary); display: flex; }

        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
        .input-wrap { position: relative; }
        .input-wrap input {
            width: 100%; padding: 11px 14px 11px 40px; border: 1.5px solid var(--border);
            border-radius: var(--radius-sm); font-family: 'Inter', sans-serif; font-size: 0.875rem;
            color: var(--text-primary); outline: none; transition: all 0.2s; background: #FFFFFF;
        }
        .input-wrap input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-dim); }
        .input-wrap .input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
        .input-wrap .toggle-pwd { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-muted); padding: 4px; }
        .forgot-link { display: block; text-align: right; font-size: 0.75rem; color: var(--text-muted); text-decoration: none; margin-top: -8px; margin-bottom: 16px; }
        .forgot-link:hover { color: var(--primary); }

        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 12px 20px; border-radius: var(--radius-sm); font-family: 'Inter', sans-serif; font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: all 0.2s; border: none; text-decoration: none; }
        .btn i { width: 1rem; height: 1rem; }
        .btn-dark { background: var(--text-primary); color: #FFFFFF; }
        .btn-dark:hover { background: #1F2937; transform: translateY(-1px); }
        .btn-dark:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border-light); }
        .divider span { font-size: 0.6875rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; }

        .btn-google {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
            background: #FFFFFF; font-family: 'Inter', sans-serif; font-size: 0.875rem;
            font-weight: 500; color: var(--text-primary); cursor: pointer; transition: all 0.2s;
        }
        .btn-google:hover { background: var(--surface); border-color: var(--text-primary); }
        .btn-google svg { width: 20px; height: 20px; }

        .auth-footer { text-align: center; padding: 16px 32px; border-top: 1px solid var(--border-light); font-size: 0.8125rem; color: var(--text-muted); }
        .auth-footer a { color: var(--primary); font-weight: 600; text-decoration: none; }
        .auth-footer a:hover { text-decoration: underline; }

        @media (max-width: 480px) {
            .auth-header { padding: 28px 20px 24px; }
            .auth-body { padding: 24px 20px; }
            .auth-footer { padding: 14px 20px; }
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <a href="landing.html" class="auth-logo">
            <img src="../asset/logo.svg" alt="warap" style="height: 40px;">

            </a>
            <div class="icon-circle"><i data-lucide="log-in" style="width:1.8rem;height:1.8rem"></i></div>
            <h1>Connexion requise</h1>
            <p>Connectez-vous pour accéder à cette fonctionnalité</p>
        </div>

        <div class="auth-body">
            <div class="alert" id="formAlert"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Adresse email</label>
                    <div class="input-wrap">
                        <i data-lucide="mail" class="input-icon" style="width:1rem;height:1rem"></i>
                        <input type="email" id="emailInput" placeholder="jean@email.com" required autocomplete="email">
                    </div>
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <div class="input-wrap">
                        <i data-lucide="lock" class="input-icon" style="width:1rem;height:1rem"></i>
                        <input type="password" id="passwordInput" placeholder="Votre mot de passe" required autocomplete="current-password">
                        <button type="button" class="toggle-pwd" onclick="togglePassword()"><i data-lucide="eye" style="width:1rem;height:1rem" id="toggleIcon"></i></button>
                    </div>
                </div>
                <a href="#" class="forgot-link">Mot de passe oublié ?</a>
                <button type="submit" class="btn btn-dark" id="loginBtn">Se connecter</button>
            </form>

            <div class="divider"><span>ou</span></div>

            <button class="btn-google" onclick="loginWithGoogle()">
                <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1Z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23Z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62Z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53Z" fill="#EA4335"/></svg>
                Continuer avec Google
            </button>
        </div>

        <div class="auth-footer">
            Pas encore de compte ? <a href="register-client.html">Créez-en un gratuitement</a>
        </div>
    </div>
</div>
<!-- ═══ PWA ═══ -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1A1714">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CamServices">
<link rel="apple-touch-icon" href="../asset/icons/icon-192x192.png.png">
<link rel="apple-touch-startup-image" href="../asset/screenshots/splash.png">

<!-- Service Worker -->
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('✅ SW enregistré:', reg.scope))
                .catch(err => console.warn('⚠️ SW erreur:', err));
        });
    }
</script>

<!-- Installation PWA prompt -->
<script>
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        // Afficher ton bouton "Installer l'application"
        const installBtn = document.getElementById('installPwaBtn');
        if (installBtn) {
            installBtn.style.display = 'flex';
            installBtn.addEventListener('click', () => {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((result) => {
                    console.log('PWA install:', result.outcome);
                    deferredPrompt = null;
                });
            });
        }
    });
</script>
<script>
    var SUPABASE_URL = 'https://cwubxwbzzuigctvgdygv.supabase.co';
    var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN3dWJ4d2J6enVpZ2N0dmdkeWd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMzI2MTgsImV4cCI6MjA5MzgwODYxOH0.0mwBNo_S5yItQQjq2at9GNRN74ooZRBJIbZGDH9L2uk';
    var sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
    lucide.createIcons();

    // Redirection après connexion
    var redirectUrl = localStorage.getItem('warap_redirect_url') || 'services.html';

    function showAlert(msg, type) {
        var a = document.getElementById('formAlert');
        a.innerHTML = '<i data-lucide="' + (type === 'error' ? 'alert-circle' : 'check-circle') + '" style="width:1rem;height:1rem"></i> ' + msg;
        a.className = 'alert ' + type; a.style.display = 'flex'; lucide.createIcons();
    }

    function togglePassword() {
        var pwd = document.getElementById('passwordInput');
        var icon = document.getElementById('toggleIcon');
        if (pwd.type === 'password') { pwd.type = 'text'; icon.setAttribute('data-lucide', 'eye-off'); }
        else { pwd.type = 'password'; icon.setAttribute('data-lucide', 'eye'); }
        lucide.createIcons();
    }

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        var email = document.getElementById('emailInput').value.trim();
        var password = document.getElementById('passwordInput').value;
        var btn = document.getElementById('loginBtn');

        if (!email || !password) { showAlert('Veuillez remplir tous les champs.', 'error'); return; }

        btn.disabled = true; btn.textContent = 'Connexion...';

        try {
            var { data, error } = await sb.auth.signInWithPassword({ email: email, password: password });
            if (error) {
                var msg = error.message;
                if (msg.indexOf('Invalid') !== -1) msg = 'Email ou mot de passe incorrect.';
                else if (msg.indexOf('not confirmed') !== -1) msg = 'Email non confirmé. Vérifiez vos mails.';
                showAlert(msg, 'error');
                btn.disabled = false; btn.textContent = 'Se connecter';
                return;
            }
            if (data.user) {
                localStorage.removeItem('warap_redirect_url');
                showAlert('✅ Connexion réussie ! Redirection...', 'success');
                setTimeout(function() { window.location.href = redirectUrl; }, 1000);
            }
        } catch (err) {
            showAlert('Erreur de connexion.', 'error');
            btn.disabled = false; btn.textContent = 'Se connecter';
        }
    });

    async function loginWithGoogle() {
        try {
            var { error } = await sb.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin + '/' + redirectUrl }
            });
            if (error) showAlert('Erreur Google: ' + error.message, 'error');
        } catch (err) { showAlert('Erreur connexion Google.', 'error'); }
    }
</script>
</body>
</html>
