<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Panier — CamServices</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../utils/utils.css">
    <style>
        :root {
            --ink:#1A1714;--ink-2:#2E2A25;--muted:#8A8279;--faint:#C9C2B8;
            --rule:#E8E2DA;--cream:#FAF8F5;--white:#FFFFFF;
            --gold:#C4943E;--gold-light:#D4A94E;--gold-dim:rgba(196,148,62,.08);
            --green:#3D8B5E;--green-light:#F0FDF4;--red:#DC2626;--red-light:#FEF2F2;
            --blue:#3B82F6;
   --ff-body: 'Inter', sans-serif;
    --ff-heading: 'Outfit', sans-serif;            --ease:cubic-bezier(.22,1,.36,1);
            --radius:10px;--radius-lg:16px;--radius-xl:20px;--radius-2xl:24px;
            --shadow:0 4px 20px rgba(26,23,20,.06);
            --shadow-lg:0 12px 40px rgba(26,23,20,.1);
            --max:960px;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:var(--ff-body);background:var(--cream);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.6;}
        ::selection{background:var(--gold-dim);color:var(--ink);}
        @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
        @keyframes spin{to{transform:rotate(360deg)}}

        /* ═══ NAVBAR ═══ */
        .navbar{position:sticky;top:0;z-index:50;background:rgba(250,248,245,.88);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-bottom:1px solid rgba(232,226,218,.6);padding:0 24px;}
        .navbar-inner{max-width:var(--max);margin:0 auto;height:64px;display:flex;align-items:center;justify-content:space-between;}
        .nav-logo{font-family:var(--ff-display);font-size:1.2rem;color:var(--ink);text-decoration:none;letter-spacing:-.02em;}
        .nav-logo .accent{color:var(--gold);}
        .nav-links{display:flex;align-items:center;gap:6px;}
        .nav-links a{font-size:.82rem;font-weight:500;color:var(--muted);text-decoration:none;transition:all .2s;padding:8px 14px;border-radius:var(--radius);display:flex;align-items:center;gap:6px;}
        .nav-links a:hover{color:var(--ink);background:rgba(26,23,20,.03);}
        .nav-links a i{width:.9rem;height:.9rem;}
        .cart-nav-active{background:var(--gold-dim)!important;color:var(--gold)!important;font-weight:600!important;}
        .cart-count{background:var(--gold);color:var(--white);font-size:.6rem;font-weight:700;padding:2px 7px;border-radius:10px;min-width:18px;text-align:center;}
        .btn-nav{background:var(--ink);color:var(--white)!important;padding:8px 16px;border-radius:var(--radius);font-weight:600!important;}
        .btn-nav:hover{background:var(--ink-2)!important;}

        /* ═══ MAIN ═══ */
        .main-content{max-width:var(--max);margin:0 auto;padding:36px 24px;}
        .page-header{margin-bottom:32px;}
        .page-header h1{font-family:var(--ff-display);font-weight:400;font-size:1.7rem;letter-spacing:-.02em;}
        .page-header h1 .accent{color:var(--gold);font-style:italic;}
        .page-header p{font-size:.85rem;color:var(--muted);margin-top:4px;}

        /* ═══ EMPTY ═══ */
        .empty-cart{text-align:center;padding:72px 20px;background:var(--white);border:1px solid var(--rule);border-radius:var(--radius-xl);}
        .empty-cart-icon{width:72px;height:72px;border-radius:50%;background:var(--cream);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;color:var(--faint);}
        .empty-cart h2{font-family:var(--ff-display);font-weight:400;font-size:1.25rem;margin-bottom:6px;}
        .empty-cart p{color:var(--muted);font-size:.88rem;margin-bottom:22px;}

        /* ═══ AUTH REQUIRED STATE ═══ */
        .auth-required{text-align:center;padding:72px 20px;background:var(--white);border:1px solid var(--rule);border-radius:var(--radius-xl);animation:slideUp .4s var(--ease);}
        .auth-required-icon{width:80px;height:80px;border-radius:50%;background:var(--gold-dim);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;color:var(--gold);}
        .auth-required h2{font-family:var(--ff-display);font-weight:400;font-size:1.4rem;margin-bottom:10px;letter-spacing:-.02em;}
        .auth-required p{color:var(--muted);font-size:.88rem;margin-bottom:26px;max-width:380px;margin-left:auto;margin-right:auto;line-height:1.6;}
        .auth-required-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}

        /* ═══ BUTTONS ═══ */
        .btn{display:inline-flex;align-items:center;gap:8px;font-family:var(--ff-body);font-weight:600;font-size:.82rem;padding:11px 22px;border-radius:var(--radius);border:none;cursor:pointer;text-decoration:none;transition:all .25s var(--ease);}
        .btn i{width:.9rem;height:.9rem;}
        .btn-primary{background:var(--ink);color:var(--white);}.btn-primary:hover{background:var(--ink-2);transform:translateY(-1px);box-shadow:0 6px 20px rgba(26,23,20,.15);}
        .btn-outline{background:transparent;color:var(--ink);border:1.5px solid var(--rule);}.btn-outline:hover{border-color:var(--gold);color:var(--gold);}
        .btn-gold{background:var(--gold);color:var(--white);}.btn-gold:hover{background:var(--gold-light);transform:translateY(-1px);box-shadow:0 6px 20px rgba(196,148,62,.25);}

        /* ═══ CART ITEMS ═══ */
        .cart-items{display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
        .cart-item{background:var(--white);border:1px solid var(--rule);border-radius:var(--radius-lg);padding:18px 22px;display:flex;align-items:center;gap:16px;transition:all .25s var(--ease);animation:fadeUp .4s var(--ease);}
        .cart-item:hover{border-color:var(--gold);box-shadow:var(--shadow);}
        .cart-item-icon{width:46px;height:46px;border-radius:var(--radius);background:var(--ink);color:var(--white);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
        .cart-item-icon i{width:1.2rem;height:1.2rem;}
        .cart-item-info{flex:1;min-width:0;}
        .cart-item-title{font-weight:700;font-size:.92rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .cart-item-meta{font-size:.76rem;color:var(--muted);display:flex;align-items:center;gap:5px;margin-top:2px;}
        .cart-item-meta i{width:.7rem;height:.7rem;}
        .cart-item-price{font-family:var(--ff-display);font-size:1rem;color:var(--gold);white-space:nowrap;}
        .cart-item-remove{background:none;border:none;cursor:pointer;color:var(--faint);padding:6px;border-radius:6px;transition:all .2s;}
        .cart-item-remove:hover{color:var(--red);background:var(--red-light);}

        /* ═══ SUMMARY ═══ */
        .cart-summary{background:var(--white);border:1px solid var(--rule);border-radius:var(--radius-lg);padding:24px;margin-bottom:20px;}
        .cart-summary-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;}
        .cart-summary-row.total{border-top:1px solid var(--rule);margin-top:10px;padding-top:14px;}
        .cart-summary-label{font-size:.82rem;color:var(--muted);}
        .cart-summary-value{font-weight:700;font-size:.88rem;}
        .cart-summary-value.grand-total{font-family:var(--ff-display);font-size:1.25rem;color:var(--gold);}
        .cart-actions{display:flex;gap:10px;flex-wrap:wrap;}

        /* ═══ MESSAGE ═══ */
        .cart-message{padding:12px 16px;border-radius:var(--radius);font-size:.82rem;font-weight:500;margin-top:18px;display:none;align-items:center;gap:8px;}
        .cart-message.show{display:flex;}
        .cart-message.success{background:var(--green-light);color:var(--green);}
        .cart-message.error{background:var(--red-light);color:var(--red);}
        .cart-message.info{background:#EFF6FF;color:var(--blue);}

        /* ═══ MODAL ═══ */
        .modal-overlay{position:fixed;inset:0;background:rgba(26,23,20,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);animation:fadeIn .2s ease;}
        .modal{background:var(--white);border-radius:var(--radius-2xl);padding:28px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:slideUp .3s var(--ease);}
        .modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
        .modal-title{font-family:var(--ff-display);font-weight:400;font-size:1.15rem;display:flex;align-items:center;gap:8px;}
        .modal-title i{color:var(--gold);}
        .modal-close{background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;border-radius:6px;transition:all .2s;}
        .modal-close:hover{color:var(--ink);background:var(--cream);}
        .form-group{margin-bottom:16px;}
        .form-group label{display:block;font-size:.76rem;font-weight:600;color:var(--ink);margin-bottom:5px;}
        .form-group label .required{color:var(--red);}
        .form-group input,.form-group textarea{width:100%;padding:10px 14px;border:1.5px solid var(--rule);border-radius:var(--radius);font-family:var(--ff-body);font-size:.85rem;color:var(--ink);outline:none;transition:all .2s;}
        .form-group input:focus,.form-group textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-dim);}
        .form-group input::placeholder,.form-group textarea::placeholder{color:var(--faint);}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
        .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}

        /* ═══ SUCCESS ═══ */
        .success-state{text-align:center;padding:56px 20px;background:var(--white);border:1px solid var(--rule);border-radius:var(--radius-xl);animation:slideUp .4s var(--ease);}
        .success-icon{width:72px;height:72px;border-radius:50%;background:var(--green-light);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;color:var(--green);}
        .success-state h2{font-family:var(--ff-display);font-weight:400;font-size:1.25rem;margin-bottom:6px;}
        .success-state p{color:var(--muted);font-size:.88rem;margin-bottom:22px;}

        /* ═══ LOADING ═══ */
        .loading-state{text-align:center;padding:80px 20px;}
        .loading-spinner{width:36px;height:36px;border:2.5px solid var(--rule);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px;}

        @media(max-width:600px){
            .main-content{padding:20px 16px;}
            .cart-actions{flex-direction:column;}
            .cart-actions .btn{width:100%;justify-content:center;}
            .form-row{grid-template-columns:1fr;}
            .cart-item{padding:14px 16px;gap:12px;}
            .auth-required-actions{flex-direction:column;}
            .auth-required-actions .btn{width:100%;justify-content:center;}
        }
    </style>
</head>
<body>
<!-- ═══ NAVBAR ═══ -->
<nav class="navbar">
    <div class="navbar-inner">
<a href="landing.html" class="nav-logo">
 <img src="../asset/logo camservices.svg" alt="CamServices" class="logo-img"></a>
         <button class="menu-toggle" id="menuToggle" onclick="toggleMenu()"><span></span><span></span><span></span></button>
        <div class="nav-links" id="navLinks">
            <a href="services.html"><i data-lucide="search"></i> Explorer</a>
            <a href="cart.html" class="cart-nav-active"><i data-lucide="shopping-cart"></i> Panier <span class="cart-count" id="cartCount">0</span></a>
            <a href="login-client.html" class="btn-nav" id="navLogin">Connexion</a>
        </div>
    </div>
</nav>

<!-- ═══ MAIN ═══ -->
<main class="main-content">
    <div class="page-header">
        <h1>Mon <span class="accent">panier</span></h1>
        <p>Finalisez vos demandes de services</p>
    </div>
    <div id="cartContainer">
        <div class="loading-state">
            <div class="loading-spinner"></div>
            <p style="color:var(--muted);font-size:.85rem">Vérification de la session...</p>
        </div>
    </div>
    <div class="cart-message" id="cartMessage"></div>
</main>

<div id="modalContainer"></div>

<script src="../js/global.js"></script>
<script>
    var SUPABASE_URL = 'https://cwubxwbzzuigctvgdygv.supabase.co';
    var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN3dWJ4d2J6enVpZ2N0dmdkeWd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMzI2MTgsImV4cCI6MjA5MzgwODYxOH0.0mwBNo_S5yItQQjq2at9GNRN74ooZRBJIbZGDH9L2uk';
    var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    var _isUserLoggedIn = false;

    lucide.createIcons();
    init();

    async function init() {
        updateCartCount();
        // ⚠️ Vérifier la session AVANT toute autre action
        var hasSession = await checkUserSession();
        if (!hasSession) {
            showAuthRequired();
            return;
        }
        displayCart();
    }

    function getCart() {
        try { return JSON.parse(localStorage.getItem('camservices_cart') || '[]'); }
        catch(e) { return []; }
    }
    function saveCart(cart) { localStorage.setItem('camservices_cart', JSON.stringify(cart)); }
    function clearCart() { localStorage.removeItem('camservices_cart'); }

    function updateCartCount() {
        var el = document.getElementById('cartCount');
        if (el) { el.textContent = getCart().length; }
    }

    async function checkUserSession() {
        var { data } = await sb.auth.getSession();
        _isUserLoggedIn = !!(data.session);
        var btn = document.getElementById('navLogin');
        if (_isUserLoggedIn && btn) {
            btn.textContent = 'Mon compte';
            btn.href = 'login-client.html';
        }
        return _isUserLoggedIn;
    }

    // ⚠️ Helper centralisé pour exiger la connexion
    async function requireAuth(actionLabel) {
        var { data } = await sb.auth.getSession();
        if (data.session) { _isUserLoggedIn = true; return true; }
        _isUserLoggedIn = false;
        showAuthRequired(actionLabel);
        return false;
    }

    // Affichage du state "connexion requise"
    function showAuthRequired(actionLabel) {
        // Sauvegarde de l'URL pour redirection après login
        localStorage.setItem('camservices_redirect_url', window.location.href);

        var msg = actionLabel
            ? 'Vous devez vous connecter pour ' + actionLabel + '.'
            : 'Vous devez être connecté pour consulter votre panier et passer des commandes.';

        var container = document.getElementById('cartContainer');
        container.innerHTML =
            '<div class="auth-required">'
            + '<div class="auth-required-icon"><i data-lucide="lock" style="width:2.2rem;height:2.2rem"></i></div>'
            + '<h2>Connexion requise</h2>'
            + '<p>' + msg + ' Connectez-vous ou créez un compte gratuitement en quelques secondes.</p>'
            + '<div class="auth-required-actions">'
            + '<a href="login-client.html" class="btn btn-primary"><i data-lucide="log-in"></i> Se connecter</a>'
            + '<a href="signup-client.html" class="btn btn-outline"><i data-lucide="user-plus"></i> Créer un compte</a>'
            + '</div>'
            + '</div>';
        lucide.createIcons();
    }

    function displayCart() {
        var container = document.getElementById('cartContainer');
        var cart = getCart();
        updateCartCount();

        if (cart.length === 0) {
            container.innerHTML = '<div class="empty-cart">'
                + '<div class="empty-cart-icon"><i data-lucide="shopping-cart" style="width:2.2rem;height:2.2rem"></i></div>'
                + '<h2>Votre panier est vide</h2>'
                + '<p>Parcourez les services et ajoutez ceux qui vous intéressent.</p>'
                + '<a href="services.html" class="btn btn-primary"><i data-lucide="search"></i> Explorer les services</a>'
                + '</div>';
            lucide.createIcons();
            return;
        }

        var total = 0;
        var icons = { 'Plomberie':'wrench','Électricité':'zap','Ménage':'spray-can','Photographie':'camera','Développement web':'monitor','Cours particuliers':'book-open','Transport':'car','Design':'palette','Beauté':'sparkles','Bâtiment':'hard-hat' };
        var itemsHtml = '';

        for (var i = 0; i < cart.length; i++) {
            var item = cart[i];
            total += item.price || 0;
            var iconName = icons[item.category] || 'briefcase';
            itemsHtml += '<div class="cart-item" style="animation-delay:' + (i * .06) + 's">'
                + '<div class="cart-item-icon"><i data-lucide="' + iconName + '"></i></div>'
                + '<div class="cart-item-info">'
                + '<div class="cart-item-title">' + esc(item.title) + '</div>'
                + '<div class="cart-item-meta"><i data-lucide="user"></i> ' + esc(item.providerName || 'Inconnu') + (item.providerCity ? ' · ' + esc(item.providerCity) : '') + '</div>'
                + '</div>'
                + '<div class="cart-item-price">' + fmt(item.price) + '</div>'
                + '<button class="cart-item-remove" onclick="removeItem(\'' + item.serviceId + '\',' + i + ')"><i data-lucide="x" style="width:1rem;height:1rem"></i></button>'
                + '</div>';
        }

        container.innerHTML = '<div class="cart-items">' + itemsHtml + '</div>'
            + '<div class="cart-summary">'
            + '<div class="cart-summary-row"><span class="cart-summary-label">Nombre de services</span><span class="cart-summary-value">' + cart.length + '</span></div>'
            + '<div class="cart-summary-row total"><span class="cart-summary-label">Total estimé</span><span class="cart-summary-value grand-total">' + fmt(total) + '</span></div>'
            + '</div>'
            + '<div class="cart-actions">'
            + '<button class="btn btn-gold" onclick="openConfirmModal()"><i data-lucide="send"></i> Prendre rendez-vous</button>'
            + '<button class="btn btn-outline" onclick="clearAll()"><i data-lucide="trash-2"></i> Vider</button>'
            + '<a href="services.html" class="btn btn-outline"><i data-lucide="search"></i> Continuer</a>'
            + '</div>';
        lucide.createIcons();
    }

    async function removeItem(serviceId, index) {
        // ⚠️ Vérification de connexion
        var isAuth = await requireAuth('gérer votre panier');
        if (!isAuth) return;

        var cart = getCart().filter(function(item) { return item.serviceId !== serviceId; });
        saveCart(cart);
        displayCart();
        showMsg('Service retiré.', 'info');
    }

    async function clearAll() {
        // ⚠️ Vérification de connexion
        var isAuth = await requireAuth('gérer votre panier');
        if (!isAuth) return;

        if (!confirm('Vider le panier ?')) return;
        clearCart();
        displayCart();
        showMsg('Panier vidé.', 'info');
    }

    async function openConfirmModal() {
        var cart = getCart();
        if (cart.length === 0) return;

        // ⚠️ Vérification de connexion OBLIGATOIRE pour passer commande
        var isAuth = await requireAuth('passer une commande');
        if (!isAuth) return;

        var total = 0;
        for (var i = 0; i < cart.length; i++) total += cart[i].price || 0;

        document.getElementById('modalContainer').innerHTML =
            '<div class="modal-overlay" onclick="if(event.target===this)closeModal()">'
            + '<div class="modal">'
            + '<div class="modal-header">'
            + '<h3 class="modal-title"><i data-lucide="clipboard-list" style="width:1.1rem;height:1.1rem"></i> Confirmer votre commande</h3>'
            + '<button class="modal-close" onclick="closeModal()"><i data-lucide="x"></i></button>'
            + '</div>'
            + '<div style="background:var(--cream);border-radius:var(--radius);padding:13px 16px;margin-bottom:18px">'
            + '<div style="display:flex;justify-content:space-between"><span style="font-size:.78rem;color:var(--muted)">Services</span><span style="font-weight:700;font-size:.85rem">' + cart.length + '</span></div>'
            + '<div style="display:flex;justify-content:space-between;margin-top:4px"><span style="font-size:.78rem;color:var(--muted)">Total</span><span style="font-family:var(--ff-display);font-weight:400;color:var(--gold)">' + fmt(total) + '</span></div>'
            + '</div>'
            + '<form id="confirmForm">'
            + '<div class="form-row">'
            + '<div class="form-group"><label>Nom complet <span class="required">*</span></label><input type="text" id="clientName" placeholder="Votre nom complet" required></div>'
            + '<div class="form-group"><label>Téléphone <span class="required">*</span></label><input type="tel" id="clientPhone" placeholder="+237 6XX XXX XXX" required></div>'
            + '</div>'
            + '<div class="form-group"><label>Adresse <span class="required">*</span></label><input type="text" id="clientAddress" placeholder="Ex: Bastos, Yaoundé" required></div>'
            + '<div class="form-group"><label>Message (optionnel)</label><textarea id="clientMessage" rows="2" placeholder="Précisez vos besoins..."></textarea></div>'
            + '<div style="background:#EFF6FF;border-radius:var(--radius);padding:11px 14px;font-size:.73rem;color:#3B82F6;display:flex;align-items:flex-start;gap:8px">'
            + '<i data-lucide="info" style="width:.9rem;height:.9rem;flex-shrink:0;margin-top:1px"></i>'
            + '<span>Ces informations seront transmises aux prestataires.</span>'
            + '</div>'
            + '<div class="modal-actions">'
            + '<button type="button" class="btn btn-outline" onclick="closeModal()">Annuler</button>'
            + '<button type="submit" class="btn btn-gold"><i data-lucide="send"></i> Envoyer la commande</button>'
            + '</div>'
            + '</form>'
            + '</div></div>';
        lucide.createIcons();

        document.getElementById('confirmForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            await sendOrders();
        });
    }

    function closeModal() {
        document.getElementById('modalContainer').innerHTML = '';
    }

    async function sendOrders() {
        var cart = getCart();
        if (cart.length === 0) return;

        // ⚠️ Re-vérification de la connexion au moment de l'envoi (sécurité)
        var { data: sessionData } = await sb.auth.getSession();
        if (!sessionData.session) {
            closeModal();
            showAuthRequired('passer une commande');
            return;
        }

        var clientName = document.getElementById('clientName').value.trim();
        var clientPhone = document.getElementById('clientPhone').value.trim();
        var clientAddress = document.getElementById('clientAddress').value.trim();
        var clientMessage = document.getElementById('clientMessage').value.trim();

        if (!clientName || !clientPhone || !clientAddress) {
            showMsg('Veuillez remplir tous les champs obligatoires.', 'error');
            return;
        }

        var submitBtn = document.querySelector('#confirmForm button[type="submit"]');
        if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Envoi...'; }

        try {
            var clientClientId = null;

            var { data: clientProfile } = await sb
                .from('users_clients')
                .select('id')
                .eq('auth_id', sessionData.session.user.id)
                .single();
            if (clientProfile) clientClientId = clientProfile.id;

            var orders = [];
            for (var i = 0; i < cart.length; i++) {
                orders.push({
                    client_client_id: clientClientId,
                    service_id: cart[i].serviceId,
                    provider_id: cart[i].providerId || null,
                    total_amount: cart[i].price || 0,
                    status: 'pending',
                    client_name: clientName,
                    client_phone: clientPhone,
                    client_address: clientAddress,
                    client_message: clientMessage || null
                });
            }

            var { error } = await sb.from('orders').insert(orders);
            if (error) throw error;

            closeModal();
            clearCart();
            displayCart();

            document.getElementById('cartContainer').innerHTML =
                '<div class="success-state">'
                + '<div class="success-icon"><i data-lucide="check-circle" style="width:2.5rem;height:2.5rem"></i></div>'
                + '<h2>Commande envoyée avec succès !</h2>'
                + '<p>Les prestataires vous contacteront dans les plus brefs délais.</p>'
                + '<a href="services.html" class="btn btn-primary"><i data-lucide="search"></i> Explorer plus de services</a>'
                + '</div>';
            lucide.createIcons();

        } catch (err) {
            console.error('Erreur:', err);
            showMsg('Erreur : ' + err.message, 'error');
            if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'Envoyer la commande'; }
        }
    }

    function showMsg(msg, type) {
        var el = document.getElementById('cartMessage');
        el.innerHTML = '<i data-lucide="' + (type === 'success' ? 'check-circle' : type === 'error' ? 'alert-circle' : 'info') + '" style="width:.9rem;height:.9rem"></i> ' + msg;
        el.className = 'cart-message show ' + type;
        lucide.createIcons();
        setTimeout(function(){ el.classList.remove('show'); }, 4000);
    }
    function esc(t) { var d = document.createElement('div'); d.textContent = t || ''; return d.innerHTML; }
    function fmt(p) { return new Intl.NumberFormat('fr-FR', { style:'currency', currency:'XAF', maximumFractionDigits:0 }).format(p || 0); }
</script>
<script>

    // ═══════════════ TOGGLE MENU ═══════════════
function toggleMenu() {
    var nav = document.getElementById('navLinks');
    var overlay = document.getElementById('navOverlay');
    var toggle = document.getElementById('menuToggle');
    
    if (!nav || !overlay || !toggle) return;
    
    nav.classList.toggle('show');
    overlay.classList.toggle('show');
    toggle.classList.toggle('open');
    document.body.style.overflow = nav.classList.contains('show') ? 'hidden' : '';
}

// Fermer le menu au clic sur un lien
document.addEventListener('DOMContentLoaded', function() {
    var links = document.querySelectorAll('#navLinks a');
    for (var i = 0; i < links.length; i++) {
        links[i].addEventListener('click', function() {
            var nav = document.getElementById('navLinks');
            var overlay = document.getElementById('navOverlay');
            var toggle = document.getElementById('menuToggle');
            if (nav) nav.classList.remove('show');
            if (overlay) overlay.classList.remove('show');
            if (toggle) toggle.classList.remove('open');
            document.body.style.overflow = '';
        });
    }
});
</script>
