<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Panier — CamServices</title>
    <link href="https://fonts.googleapis.com/css2?family=Allison&family=Outfit:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <link rel="stylesheet" href="../css/global.css">

    <style>
        :root {
            --ink: #1A1714; --ink-2: #2E2A25; --muted: #8A8279; --faint: #C9C2B8;
            --rule: #E8E2DA; --cream: #FAF8F5; --white: #FFFFFF;
            --gold: #C4943E; --gold-light: #D4A94E; --gold-dim: rgba(196,148,62,.08);
            --green: #3D8B5E; --green-light: #F0FDF4; --red: #DC2626; --red-light: #FEF2F2;
--ff-body: 'Outfit';
    --ff-script: 'Outfit'; 
     --ease: cubic-bezier(.22,1,.36,1);
            --radius: 10px; --radius-lg: 16px; --radius-xl: 20px;
            --shadow: 0 4px 20px rgba(26,23,20,.06);
            --shadow-lg: 0 12px 40px rgba(26,23,20,.1);
            --max: 1000px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--ff-body); background: var(--cream); color: var(--ink);
            min-height: 100vh; -webkit-font-smoothing: antialiased; line-height: 1.6;
        }
        @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
        @keyframes slideUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
        @keyframes spin { to { transform:rotate(360deg); } }

        .navbar { position:sticky; top:0; z-index:50; background:rgba(250,248,245,.92); backdrop-filter:blur(20px); border-bottom:1px solid var(--rule); padding:0 32px; }
        .navbar-inner { max-width:var(--max); margin:0 auto; height:64px; display:flex; align-items:center; justify-content:space-between; }
        .nav-logo { font-weight:700; font-size:1.1rem; color:var(--ink); text-decoration:none; letter-spacing:-.02em; }
        .nav-logo .script { font-family:var(--ff-script); font-size:1.9rem; color:var(--gold); position:relative; top:3px; }
        .nav-links { display:flex; align-items:center; gap:16px; }
        .nav-links a { font-size:.82rem; font-weight:500; color:var(--muted); text-decoration:none; transition:color .2s; display:flex; align-items:center; gap:6px; }
        .nav-links a:hover { color:var(--ink); }
        .cart-nav-btn { display:flex; align-items:center; gap:6px; padding:8px 14px; border-radius:var(--radius); background:var(--gold-dim); color:var(--gold)!important; font-weight:600!important; }
        .cart-nav-btn .cart-count { background:var(--gold); color:var(--white); font-size:.65rem; font-weight:700; padding:2px 7px; border-radius:10px; min-width:20px; text-align:center; }
        .btn-nav { background:var(--ink); color:var(--white)!important; padding:8px 16px; border-radius:var(--radius); font-weight:600!important; }

        .main-content { max-width:var(--max); margin:0 auto; padding:40px 32px; }
        .page-header { margin-bottom:36px; }
        .page-header h1 { font-weight:800; font-size:1.8rem; letter-spacing:-.03em; }
        .page-header h1 .script { font-family:var(--ff-script); font-size:2.4rem; color:var(--gold); font-weight:400; }
        .page-header p { font-size:.88rem; color:var(--muted); margin-top:4px; }

        .empty-cart { text-align:center; padding:80px 20px; background:var(--white); border:1px solid var(--rule); border-radius:var(--radius-lg); }
        .empty-cart-icon { width:80px; height:80px; border-radius:50%; background:var(--cream); display:flex; align-items:center; justify-content:center; margin:0 auto 20px; color:var(--faint); }
        .empty-cart h2 { font-weight:700; font-size:1.3rem; margin-bottom:8px; }
        .empty-cart p { color:var(--muted); font-size:.9rem; margin-bottom:24px; }

        .btn { display:inline-flex; align-items:center; gap:8px; font-family:var(--ff-body); font-weight:600; font-size:.85rem; padding:12px 24px; border-radius:var(--radius); border:none; cursor:pointer; text-decoration:none; transition:all .3s var(--ease); }
        .btn-primary { background:var(--ink); color:var(--white); }
        .btn-primary:hover { background:var(--ink-2); transform:translateY(-1px); }
        .btn-outline { background:transparent; color:var(--ink); border:1.5px solid var(--rule); }
        .btn-outline:hover { border-color:var(--gold); color:var(--gold); }
        .btn-gold { background:var(--gold); color:var(--white); }
        .btn-gold:hover { background:var(--gold-light); transform:translateY(-1px); }

        .cart-items { display:flex; flex-direction:column; gap:12px; margin-bottom:24px; }
        .cart-item { background:var(--white); border:1px solid var(--rule); border-radius:var(--radius-lg); padding:20px 24px; display:flex; align-items:center; gap:16px; transition:all .3s; }
        .cart-item-icon { width:48px; height:48px; border-radius:var(--radius); background:var(--ink); color:var(--white); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
        .cart-item-info { flex:1; min-width:0; }
        .cart-item-title { font-weight:700; font-size:.95rem; }
        .cart-item-meta { font-size:.78rem; color:var(--muted); display:flex; align-items:center; gap:6px; margin-top:2px; }
        .cart-item-price { font-weight:700; font-size:1rem; color:var(--gold); white-space:nowrap; }
        .cart-item-remove { background:none; border:none; cursor:pointer; color:var(--faint); padding:6px; border-radius:6px; transition:all .2s; }
        .cart-item-remove:hover { color:var(--red); background:var(--red-light); }

        .cart-summary { background:var(--white); border:1px solid var(--rule); border-radius:var(--radius-lg); padding:28px; margin-bottom:24px; }
        .cart-summary-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; }
        .cart-summary-row.total { border-top:1px solid var(--rule); margin-top:12px; padding-top:16px; }
        .cart-summary-label { font-size:.85rem; color:var(--muted); }
        .cart-summary-value { font-weight:700; font-size:.9rem; }
        .cart-summary-value.grand-total { font-size:1.3rem; color:var(--gold); }
        .cart-actions { display:flex; gap:12px; flex-wrap:wrap; }

        .cart-message { padding:14px 18px; border-radius:var(--radius); font-size:.85rem; font-weight:500; margin-top:20px; display:none; align-items:center; gap:10px; }
        .cart-message.show { display:flex; }
        .cart-message.success { background:var(--green-light); color:var(--green); }
        .cart-message.error { background:var(--red-light); color:var(--red); }
        .cart-message.info { background:#EFF6FF; color:#3B82F6; }

        .modal-overlay { position:fixed; inset:0; background:rgba(26,23,20,.5); z-index:200; display:flex; align-items:center; justify-content:center; padding:20px; backdrop-filter:blur(4px); }
        .modal { background:var(--white); border-radius:var(--radius-xl); padding:32px; width:100%; max-width:520px; max-height:90vh; overflow-y:auto; box-shadow:var(--shadow-lg); }
        .modal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
        .modal-title { font-weight:700; font-size:1.2rem; }
        .modal-close { background:none; border:none; cursor:pointer; color:var(--muted); padding:4px; border-radius:6px; }
        .modal-close:hover { color:var(--ink); background:var(--cream); }
        .form-group { margin-bottom:18px; }
        .form-group label { display:block; font-size:.78rem; font-weight:600; color:var(--ink); margin-bottom:6px; }
        .form-group label .required { color:var(--red); }
        .form-group input, .form-group textarea { width:100%; padding:11px 14px; border:1.5px solid var(--rule); border-radius:var(--radius); font-family:var(--ff-body); font-size:.88rem; color:var(--ink); outline:none; }
        .form-group input:focus, .form-group textarea:focus { border-color:var(--gold); box-shadow:0 0 0 3px var(--gold-dim); }
        .form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
        .modal-actions { display:flex; gap:12px; justify-content:flex-end; margin-top:24px; }

        .success-state { text-align:center; padding:60px 20px; background:var(--white); border:1px solid var(--rule); border-radius:var(--radius-lg); }
        .success-icon { width:80px; height:80px; border-radius:50%; background:var(--green-light); display:flex; align-items:center; justify-content:center; margin:0 auto 20px; color:var(--green); }
        .success-state h2 { font-weight:700; font-size:1.3rem; margin-bottom:8px; }
        .success-state p { color:var(--muted); font-size:.9rem; margin-bottom:24px; }

        @media (max-width:600px) {
            .main-content { padding:24px 16px; }
            .cart-actions { flex-direction:column; }
            .cart-actions .btn { width:100%; justify-content:center; }
            .form-row { grid-template-columns:1fr; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="navbar-inner">
        <a href="landing.html" class="nav-logo">Cam<span class="script">S</span>ervices</a>
        <div class="nav-links">
            <a href="services.html"><i data-lucide="search" style="width:.9rem;height:.9rem"></i> Explorer</a>
            <a href="cart.html" class="cart-nav-btn active">
                <i data-lucide="shopping-cart" style="width:1rem;height:1rem"></i> Panier
                <span class="cart-count" id="cartCount">0</span>
            </a>
            <a href="login-client.html" class="btn-nav" id="navLogin">Connexion</a>
        </div>
    </div>
</nav>

<main class="main-content">
    <div class="page-header">
        <h1>Mon <span class="script">panier</span></h1>
        <p>Finalisez vos demandes de services</p>
    </div>
    <div id="cartContainer"></div>
    <div class="cart-message" id="cartMessage"></div>
</main>

<div id="modalContainer"></div>
<script src="../js/global.js"></script>
<script>
    // ═══════════════ CONFIG ═══════════════
    var SUPABASE_URL = 'https://cwubxwbzzuigctvgdygv.supabase.co';
    var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN3dWJ4d2J6enVpZ2N0dmdkeWd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMzI2MTgsImV4cCI6MjA5MzgwODYxOH0.0mwBNo_S5yItQQjq2at9GNRN74ooZRBJIbZGDH9L2uk';
    var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    lucide.createIcons();
    init();

    async function init() {
        updateCartCount();
        displayCart();
        checkUserSession();
    }

    // ═══════════════ PANIER ═══════════════
    function getCart() {
        try { return JSON.parse(localStorage.getItem('camservices_cart') || '[]'); }
        catch(e) { return []; }
    }
    function saveCart(cart) { localStorage.setItem('camservices_cart', JSON.stringify(cart)); }
    function clearCart() { localStorage.removeItem('camservices_cart'); }

    function updateCartCount() {
        var el = document.getElementById('cartCount');
        if (el) { el.textContent = getCart().length; }
    }

    async function checkUserSession() {
        var { data } = await sb.auth.getSession();
        var btn = document.getElementById('navLogin');
        if (data.session && btn) {
            btn.textContent = 'Mon compte';
            btn.href = '#';
        }
    }

    // ═══════════════ AFFICHAGE ═══════════════
    function displayCart() {
        var container = document.getElementById('cartContainer');
        var cart = getCart();
        updateCartCount();

        if (cart.length === 0) {
            container.innerHTML = `
                <div class="empty-cart">
                    <div class="empty-cart-icon"><i data-lucide="shopping-cart" style="width:2.5rem;height:2.5rem"></i></div>
                    <h2>Votre panier est vide</h2>
                    <p>Parcourez les services et ajoutez ceux qui vous intéressent.</p>
                    <a href="services.html" class="btn btn-primary"><i data-lucide="search" style="width:1rem;height:1rem"></i> Explorer les services</a>
                </div>`;
            lucide.createIcons();
            return;
        }

        var total = 0;
        var icons = { 'Plomberie':'wrench','Électricité':'zap','Ménage':'spray-can','Photographie':'camera','Développement web':'monitor','Cours particuliers':'book-open','Transport':'car','Design':'palette','Beauté':'sparkles','Bâtiment':'hard-hat' };
        var itemsHtml = '';

        for (var i = 0; i < cart.length; i++) {
            var item = cart[i];
            total += item.price || 0;
            itemsHtml += `
                <div class="cart-item" id="cartItem${i}">
                    <div class="cart-item-icon"><i data-lucide="${icons[item.category] || 'briefcase'}" style="width:1.3rem;height:1.3rem"></i></div>
                    <div class="cart-item-info">
                        <div class="cart-item-title">${esc(item.title)}</div>
                        <div class="cart-item-meta"><i data-lucide="user" style="width:.7rem;height:.7rem"></i> ${esc(item.providerName || 'Inconnu')}${item.providerCity ? ' · '+esc(item.providerCity) : ''}</div>
                    </div>
                    <div class="cart-item-price">${fmt(item.price)}</div>
                    <button class="cart-item-remove" onclick="removeItem('${item.serviceId}',${i})"><i data-lucide="x" style="width:1.1rem;height:1.1rem"></i></button>
                </div>`;
        }

        container.innerHTML = `
            <div class="cart-items">${itemsHtml}</div>
            <div class="cart-summary">
                <div class="cart-summary-row"><span class="cart-summary-label">Nombre de services</span><span class="cart-summary-value">${cart.length}</span></div>
                <div class="cart-summary-row total"><span class="cart-summary-label">Total estimé</span><span class="cart-summary-value grand-total">${fmt(total)}</span></div>
            </div>
            <div class="cart-actions">
                <button class="btn btn-gold" onclick="openConfirmModal()"><i data-lucide="send" style="width:1rem;height:1rem"></i> Commander</button>
                <button class="btn btn-outline" onclick="clearAll()"><i data-lucide="trash-2" style="width:1rem;height:1rem"></i> Vider</button>
                <a href="services.html" class="btn btn-outline"><i data-lucide="search" style="width:1rem;height:1rem"></i> Continuer</a>
            </div>`;
        lucide.createIcons();
    }

    // ═══════════════ ACTIONS ═══════════════
    function removeItem(serviceId, index) {
        var cart = getCart().filter(function(item) { return item.serviceId !== serviceId; });
        saveCart(cart);
        displayCart();
        showMsg('Service retiré.', 'info');
    }

    function clearAll() {
        if (!confirm('Vider le panier ?')) return;
        clearCart();
        displayCart();
        showMsg('Panier vidé.', 'info');
    }

    // ═══════════════ MODAL ═══════════════
    function openConfirmModal() {
        var cart = getCart();
        if (cart.length === 0) return;

        var total = 0;
        for (var i = 0; i < cart.length; i++) total += cart[i].price || 0;

        document.getElementById('modalContainer').innerHTML = `
            <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
                <div class="modal">
                    <div class="modal-header">
                        <h3 class="modal-title"><i data-lucide="clipboard-list" style="width:1.2rem;height:1.2rem;color:var(--gold)"></i> Confirmer votre commande</h3>
                        <button class="modal-close" onclick="closeModal()"><i data-lucide="x"></i></button>
                    </div>
                    <div style="background:var(--cream);border-radius:var(--radius);padding:14px 16px;margin-bottom:20px">
                        <div style="display:flex;justify-content:space-between"><span style="font-size:.8rem;color:var(--muted)">Services</span><span style="font-weight:700">${cart.length}</span></div>
                        <div style="display:flex;justify-content:space-between;margin-top:4px"><span style="font-size:.8rem;color:var(--muted)">Total</span><span style="font-weight:700;color:var(--gold)">${fmt(total)}</span></div>
                    </div>
                    <form id="confirmForm">
                        <div class="form-row">
                            <div class="form-group"><label>Nom complet <span class="required">*</span></label><input type="text" id="clientName" placeholder="Votre nom complet" required></div>
                            <div class="form-group"><label>Téléphone <span class="required">*</span></label><input type="tel" id="clientPhone" placeholder="+237 6XX XXX XXX" required></div>
                        </div>
                        <div class="form-group"><label>Adresse <span class="required">*</span></label><input type="text" id="clientAddress" placeholder="Ex: Bastos, Yaoundé" required></div>
                        <div class="form-group"><label>Message (optionnel)</label><textarea id="clientMessage" rows="2" placeholder="Précisez vos besoins..."></textarea></div>
                        <div style="background:#EFF6FF;border-radius:var(--radius);padding:12px 14px;font-size:.75rem;color:#3B82F6;display:flex;align-items:flex-start;gap:8px">
                            <i data-lucide="info" style="width:1rem;height:1rem;flex-shrink:0;margin-top:1px"></i>
                            <span>Ces informations seront transmises aux prestataires.</span>
                        </div>
                        <div class="modal-actions">
                            <button type="button" class="btn btn-outline" onclick="closeModal()">Annuler</button>
                            <button type="submit" class="btn btn-gold"><i data-lucide="send" style="width:1rem;height:1rem"></i> Envoyer la commande</button>
                        </div>
                    </form>
                </div>
            </div>`;
        lucide.createIcons();

        document.getElementById('confirmForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            await sendOrders();
        });
    }

    function closeModal() {
        document.getElementById('modalContainer').innerHTML = '';
    }

    // ═══════════════ ENVOI COMMANDES ═══════════════
       async function sendOrders() {
    var cart = getCart();
    if (cart.length === 0) return;

    var clientName = document.getElementById('clientName').value.trim();
    var clientPhone = document.getElementById('clientPhone').value.trim();
    var clientAddress = document.getElementById('clientAddress').value.trim();
    var clientMessage = document.getElementById('clientMessage').value.trim();

    if (!clientName || !clientPhone || !clientAddress) {
        showMsg('Veuillez remplir tous les champs obligatoires.', 'error');
        return;
    }

    var submitBtn = document.querySelector('#confirmForm button[type="submit"]');
    if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Envoi...'; }

    try {
        var clientClientId = null;
        var { data: sessionData } = await sb.auth.getSession();
        
        if (sessionData.session) {
            var { data: clientProfile } = await sb
                .from('users_clients')
                .select('id')
                .eq('auth_id', sessionData.session.user.id)
                .single();
            if (clientProfile) clientClientId = clientProfile.id;
        }

        var orders = [];
        for (var i = 0; i < cart.length; i++) {
            orders.push({
                // ✅ Ne PAS envoyer client_id (table users = prestataires)
                client_client_id: clientClientId,  // ✅ Table users_clients
                service_id: cart[i].serviceId,
                provider_id: cart[i].providerId || null,
                total_amount: cart[i].price || 0,
                status: 'pending',
                client_name: clientName,
                client_phone: clientPhone,
                client_address: clientAddress,
                client_message: clientMessage || null
            });
        }

        console.log('📦 Commandes:', orders);

        var { error } = await sb.from('orders').insert(orders);
        if (error) {
            console.error('❌ Erreur insertion:', error);
            throw error;
        }

        closeModal();
        clearCart();
        displayCart();

        document.getElementById('cartContainer').innerHTML = `
            <div class="success-state">
                <div class="success-icon"><i data-lucide="check-circle" style="width:3rem;height:3rem"></i></div>
                <h2>Commande envoyée avec succès !</h2>
                <p>Les prestataires vous contacteront dans les plus brefs délais.</p>
                <a href="services.html" class="btn btn-primary"><i data-lucide="search" style="width:1rem;height:1rem"></i> Explorer plus de services</a>
            </div>`;
        lucide.createIcons();

    } catch (err) {
        console.error('❌', err);
        showMsg('Erreur : ' + err.message, 'error');
        if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'Envoyer la commande'; }
    }
}
    // ═══════════════ HELPERS ═══════════════
    function showMsg(msg, type) {
        var el = document.getElementById('cartMessage');
        el.innerHTML = '<i data-lucide="'+(type==='success'?'check-circle':type==='error'?'alert-circle':'info')+'" style="width:1rem;height:1rem"></i> '+msg;
        el.className = 'cart-message show '+type;
        lucide.createIcons();
        setTimeout(function(){ el.classList.remove('show'); }, 4000);
    }
    function esc(t) { var d=document.createElement('div'); d.textContent=t||''; return d.innerHTML; }
    function fmt(p) { return new Intl.NumberFormat('fr-FR',{style:'currency',currency:'XAF',maximumFractionDigits:0}).format(p||0); }
</script>
</body>
</html>
