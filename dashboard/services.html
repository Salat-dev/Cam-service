<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Services — warap Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="../css/global.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="css/ultra-responsive.css">
    <script src="js/ultra-responsive.js"></script>
     <script src="js/bottom-navbar.js"></script>
    <link rel="stylesheet" href="css/bottom-navbar.css">
    <style>
        :root {
            --primary: #22C55E; --primary-hover: #16A34A;
            --primary-light: #F0FDF4; --primary-dim: rgba(34,197,94,0.08);
            --text-primary: #111827; --text-secondary: #4B5563; --text-muted: #6B7280;
            --surface: #F9FAFB; --border: #E5E7EB; --border-light: #F3F4F6;
            --accent: #F59E0B; --accent-hover: #D97706;
            --accent-light: #FFFBEB; --accent-dim: rgba(245,158,11,0.08);
            --error: #EF4444; --error-light: #FEF2F2;
            --blue: #3B82F6; --blue-light: #EFF6FF;
            --purple: #7C3AED; --purple-light: #F5F3FF;
            --sidebar-w: 260px;
            --ease: cubic-bezier(0.16,1,0.3,1);
            --radius-sm: 8px; --radius: 12px; --radius-lg: 16px; --radius-xl: 20px;
            --shadow-xs: 0 1px 2px rgba(0,0,0,0.05);
            --shadow: 0 4px 16px rgba(0,0,0,0.06);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.1);
        }
        
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',-apple-system,sans-serif; background:var(--surface); color:var(--text-primary); display:flex; min-height:100vh; -webkit-font-smoothing:antialiased; line-height:1.5; }
        ::selection { background:var(--primary-dim); color:var(--text-primary); }
        ::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(16px) } to { opacity:1; transform:translateY(0) } }
        @keyframes spin { to { transform:rotate(360deg) } }
        @keyframes slideUp { from { opacity:0; transform:translateY(20px) } to { opacity:1; transform:translateY(0) } }
        
        /* ═══ SIDEBAR ═══ */
        .sidebar { width:var(--sidebar-w); background:#fff; border-right:1px solid var(--border-light); padding:28px 20px; display:flex; flex-direction:column; position:fixed; top:0; left:0; bottom:0; z-index:100; overflow-y:auto; transition:transform .3s; }
        .sidebar-logo { font-weight:800; font-size:1.2rem; margin-bottom:32px; text-decoration:none; color:var(--text-primary); display:flex; align-items:center; gap:4px; }
        .sidebar-logo img { height:32px; }
        .sidebar-user { display:flex; align-items:center; gap:12px; padding:14px; background:var(--surface); border-radius:var(--radius); margin-bottom:24px; border:1px solid var(--border-light); }
        .sidebar-avatar { width:42px; height:42px; border-radius:50%; background:var(--text-primary); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:.875rem; overflow:hidden; flex-shrink:0; }
        .sidebar-avatar img { width:100%; height:100%; object-fit:cover; }
        .sidebar-user-info { flex:1; min-width:0; }
        .sidebar-user-name { font-weight:600; font-size:.875rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .sidebar-user-role { font-size:.75rem; color:var(--text-muted); }
        .verify-badge { display:inline-flex; align-items:center; gap:4px; background:var(--primary); color:#fff; padding:3px 10px; border-radius:100px; font-size:.6875rem; font-weight:600; margin-top:6px; }
        .sidebar-nav { list-style:none; flex:1; }
        .sidebar-nav li { margin-bottom:2px; }
        .sidebar-nav a { display:flex; align-items:center; gap:12px; padding:10px 12px; border-radius:var(--radius-sm); font-size:.875rem; font-weight:500; color:var(--text-secondary); text-decoration:none; transition:all .2s; }
        .sidebar-nav a:hover { background:var(--surface); color:var(--text-primary); }
        .sidebar-nav a.active { background:var(--primary); color:#fff !important; font-weight:600; }
        .sidebar-nav a i { width:1.125rem; height:1.125rem; }
        .sidebar-nav .badge { margin-left:auto; background:var(--accent); color:#fff; padding:2px 8px; border-radius:100px; font-size:.6875rem; font-weight:700; }
        .sidebar-divider { border:none; border-top:1px solid var(--border-light); margin:16px 0; }
        .sidebar-footer a { display:flex; align-items:center; gap:12px; padding:10px 12px; border-radius:var(--radius-sm); font-size:.875rem; color:var(--text-secondary); text-decoration:none; }
        .sidebar-footer a:hover { color:var(--error); background:var(--error-light); }
        
        /* ═══ MAIN ═══ */
        .main-content { flex:1; margin-left:var(--sidebar-w); padding:32px; max-width:calc(100vw - var(--sidebar-w)); }
        .page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:32px; flex-wrap:wrap; gap:16px; }
        .page-title { font-weight:800; font-size:1.75rem; letter-spacing:-.03em; }
        .page-title .accent { color:var(--primary); }
        .page-subtitle { font-size:.9375rem; color:var(--text-secondary); margin-top:4px; }
        
        /* ═══ CARD & TABLE ═══ */
        .card { background:#fff; border:1px solid var(--border-light); border-radius:var(--radius-lg); padding:0; margin-bottom:24px; box-shadow:var(--shadow-xs); overflow:hidden; }
        .table-wrapper { overflow-x:auto; }
        table { width:100%; border-collapse:collapse; min-width:800px; }
        th { text-align:left; font-size:.75rem; font-weight:600; text-transform:uppercase; letter-spacing:.08em; color:var(--text-muted); padding:16px; border-bottom:2px solid var(--border-light); background:var(--surface); }
        td { padding:16px; border-bottom:1px solid var(--border-light); font-size:.875rem; }
        tr:hover td { background:var(--surface); }
        .price-cell { font-weight:700; color:var(--text-primary); }
        .service-cell { display:flex; align-items:center; gap:12px; }
        .service-icon { width:40px; height:40px; border-radius:var(--radius-sm); background:var(--primary-dim); color:var(--primary); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
        .service-desc-preview { font-size:.8125rem; color:var(--text-muted); }
        .category-tag { display:inline-flex; align-items:center; gap:4px; padding:4px 10px; border-radius:100px; font-size:.75rem; font-weight:500; background:var(--surface); color:var(--text-secondary); border:1px solid var(--border-light); }
        .status-badge { display:inline-flex; align-items:center; gap:6px; padding:5px 12px; border-radius:100px; font-size:.75rem; font-weight:600; }
        .status-active { background:var(--primary-light); color:var(--primary); }
        .status-inactive { background:var(--surface); color:var(--text-muted); }
        
        /* ═══ BUTTONS ═══ */
        .btn { display:inline-flex; align-items:center; gap:8px; font-family:'Inter',sans-serif; font-weight:600; font-size:.875rem; padding:10px 20px; border-radius:var(--radius-sm); border:none; cursor:pointer; text-decoration:none; transition:all .2s; }
        .btn i { width:1.125rem; height:1.125rem; }
        .btn-primary { background:var(--primary); color:#fff; }
        .btn-primary:hover { background:var(--primary-hover); transform:translateY(-1px); }
        .btn-secondary { background:#fff; color:var(--text-primary); border:1.5px solid var(--border); }
        .btn-secondary:hover { border-color:var(--primary); color:var(--primary); }
        .btn-sm { padding:6px 14px; font-size:.8125rem; }
        .btn-icon { width:34px; height:34px; border-radius:var(--radius-sm); border:1px solid var(--border); background:#fff; display:inline-flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text-muted); transition:all .2s; }
        .btn-icon:hover { border-color:var(--primary); color:var(--primary); background:var(--primary-light); }
        .btn-icon.danger:hover { border-color:var(--error); color:var(--error); background:var(--error-light); }
        .btn-icon.warning:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-light); }
        
        /* ═══ MODAL ═══ */
        .modal-overlay { position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.5); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; padding:20px; animation:fadeIn .2s; }
        .modal { background:#fff; border-radius:var(--radius-xl); padding:32px; width:100%; max-width:560px; max-height:85vh; overflow-y:auto; box-shadow:var(--shadow-lg); animation:slideUp .3s var(--ease); }
        .modal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
        .modal-title { font-weight:700; font-size:1.125rem; display:flex; align-items:center; gap:10px; }
        .modal-close { background:none; border:none; cursor:pointer; color:var(--text-muted); padding:6px; border-radius:var(--radius-sm); }
        .modal-close:hover { background:var(--surface); color:var(--text-primary); }
        .form-group { margin-bottom:16px; }
        .form-group label { display:block; font-size:.8125rem; font-weight:600; color:var(--text-primary); margin-bottom:6px; }
        .form-group input,.form-group select,.form-group textarea { width:100%; padding:11px 14px; border:1.5px solid var(--border); border-radius:var(--radius-sm); font-family:'Inter',sans-serif; font-size:.875rem; color:var(--text-primary); outline:none; transition:all .2s; background:#fff; }
        .form-group input:focus,.form-group select:focus,.form-group textarea:focus { border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-dim); }
        .form-group textarea { min-height:80px; resize:vertical; }
        .form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
        .form-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:24px; }
        
        /* ═══ LOADING & EMPTY ═══ */
        .loading-spinner { text-align:center; padding:64px; }
        .spinner { width:32px; height:32px; border:3px solid var(--border-light); border-top-color:var(--primary); border-radius:50%; margin:0 auto 16px; animation:spin .7s linear infinite; }
        .empty-state { text-align:center; padding:64px 20px; }
        .empty-state .empty-icon { display:block; margin:0 auto 16px; color:var(--border); }
        .empty-state h3 { font-weight:700; font-size:1.125rem; color:var(--text-primary); margin-bottom:8px; }
        .empty-state p { font-size:.875rem; color:var(--text-muted); margin-bottom:20px; }
        
        /* ═══ TOAST ═══ */
        .toast { position:fixed; bottom:24px; right:24px; z-index:999; padding:14px 20px; border-radius:var(--radius); font-weight:600; font-size:.875rem; color:#fff; box-shadow:var(--shadow-lg); display:flex; align-items:center; gap:10px; animation:slideUp .3s var(--ease); }
        .toast.success { background:var(--primary); }
        .toast.error { background:var(--error); }
        .toast.info { background:var(--text-primary); }
        
        /* ═══ MOBILE ═══ */
        .menu-toggle { display:none; position:fixed; top:16px; left:16px; z-index:101; background:#fff; border:1px solid var(--border); border-radius:var(--radius-sm); padding:10px; cursor:pointer; }
        @media (max-width:960px) {
            .menu-toggle { display:flex; align-items:center; justify-content:center; }
            .sidebar { transform:translateX(-100%); }
            .sidebar.open { transform:translateX(0); }
            .main-content { margin-left:0; padding:20px; padding-top:68px; }
        }
        @media (max-width:600px) {
            .page-header { flex-direction:column; align-items:flex-start; }
            .form-row { grid-template-columns:1fr; }
        }
    </style>
</head>
<body>

<button class="menu-toggle" onclick="toggleSidebar()"><i data-lucide="menu"></i></button>

<aside class="sidebar" id="sidebar">
    <a href="index.html" class="sidebar-logo">
                <img src="../asset/logo.svg" alt="warap" style="height: 42px;">    </a>
    <div class="sidebar-user">
        <div class="sidebar-avatar" id="sidebarAvatar"></div>
        <div class="sidebar-user-info">
            <div class="sidebar-user-name" id="sidebarName">Chargement...</div>
            <div class="sidebar-user-role" id="sidebarRole">Prestataire</div>
            <span class="verify-badge" id="verifyBadge" style="display:none"><i data-lucide="shield-check" style="width:.7rem;height:.7rem"></i> Vérifié</span>
        </div>
    </div>
    <ul class="sidebar-nav">
        <li><a href="../dashboard/index.html"><i data-lucide="layout-dashboard"></i> Vue d'ensemble</a></li>
        <li><a href="../dashboard/services.html" class="active"><i data-lucide="briefcase"></i> Mes services <span class="badge" id="serviceBadge">0</span></a></li>
        <li><a href="../dashboard/orders.html"><i data-lucide="shopping-bag"></i> Commandes <span class="badge" id="orderBadge">0</span></a></li>
        <li><a href="../dashboard/pricing.html"><i data-lucide="tags"></i> Grille tarifaire</a></li>
        <li><a href="../dashboard/portfolio.html"><i data-lucide="image"></i> Portfolio</a></li>
        <li><a href="../dashboard/activities.html"><i data-lucide="award"></i> Activités</a></li>
    </ul>
    <hr class="sidebar-divider">
    <ul class="sidebar-nav">
        <li><a href="../dashboard/profile.html"><i data-lucide="user-circle"></i> Mon profil</a></li>
        <li><a href="../dashboard/analytics.html"><i data-lucide="bar-chart-3"></i> Statistiques</a></li>
    </ul>
    <div class="sidebar-footer"><a href="../landing.html" onclick="logout();return false"><i data-lucide="log-out"></i> Déconnexion</a></div>
</aside>

<main class="main-content">
    <div class="page-header">
        <div>
            <h1 class="page-title">Mes <span class="accent">services</span></h1>
            <p class="page-subtitle">Gérez vos offres de services</p>
        </div>
        <a href="service-registration.html" class="btn btn-primary"><i data-lucide="plus"></i> Nouveau service</a>
    </div>

    <div class="card">
        <div class="table-wrapper" id="servicesTable">
            <div class="loading-spinner"><div class="spinner"></div><p>Chargement...</p></div>
        </div>
    </div>
</main>

<div id="modalContainer"></div>

<script>
const SUPABASE_URL = 'https://cwubxwbzzuigctvgdygv.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN3dWJ4d2J6enVpZ2N0dmdkeWd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMzI2MTgsImV4cCI6MjA5MzgwODYxOH0.0mwBNo_S5yItQQjq2at9GNRN74ooZRBJIbZGDH9L2uk';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

let currentUser=null, services=[];

function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); }
async function logout(){ await sb.auth.signOut(); window.location.href='../landing.html'; }
function formatPrice(p){ return new Intl.NumberFormat('fr-FR').format(p||0)+' FCFA'; }
function formatDate(d){ return d?new Date(d).toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'}):'—'; }
function esc(t){ const d=document.createElement('div'); d.textContent=t||''; return d.innerHTML; }

function showToast(msg,type='info'){
    const existing=document.querySelector('.toast'); if(existing) existing.remove();
    const icons={success:'check-circle',error:'x-circle',info:'info'};
    const t=document.createElement('div'); t.className=`toast ${type}`;
    t.innerHTML=`<i data-lucide="${icons[type]}" style="width:1.125rem;height:1.125rem"></i> ${msg}`;
    document.body.appendChild(t); lucide.createIcons();
    setTimeout(()=>{t.style.opacity='0';t.style.transform='translateY(16px)';t.style.transition='all .3s';setTimeout(()=>t.remove(),300)},3500);
}

function confirmAction(msg){
    return new Promise(resolve=>{
        const overlay=document.createElement('div'); overlay.className='modal-overlay';
        overlay.onclick=e=>{ if(e.target===overlay){ overlay.remove(); resolve(false); } };
        overlay.innerHTML=`<div class="modal"><div class="modal-header"><h3 class="modal-title"><i data-lucide="help-circle" style="color:var(--accent);width:1.25rem;height:1.25rem"></i> Confirmation</h3><button class="modal-close" id="mc"><i data-lucide="x"></i></button></div><p style="color:var(--text-secondary);line-height:1.6">${msg}</p><div class="form-actions"><button class="btn btn-secondary" id="btnNo">Annuler</button><button class="btn btn-primary" id="btnYes">Confirmer</button></div></div>`;
        document.body.appendChild(overlay); lucide.createIcons();
        document.getElementById('btnYes').onclick=()=>{overlay.remove();resolve(true)};
        document.getElementById('btnNo').onclick=()=>{overlay.remove();resolve(false)};
        document.getElementById('mc').onclick=()=>{overlay.remove();resolve(false)};
    });
}

async function initDashboard(){
    const {data:{user}}=await sb.auth.getUser();
    if(!user){ window.location.href='../login.html'; return; }
    currentUser=user;
    const {data:profile}=await sb.from('users').select('*').eq('id',user.id).maybeSingle();
    const u=profile||{full_name:user.email?.split('@')[0],role:'prestataire',is_verified:false};
    document.getElementById('sidebarName').textContent=u.full_name||'Utilisateur';
    document.getElementById('sidebarRole').textContent={prestataire:'Prestataire',client:'Client'}[u.role]||'Prestataire';
    document.getElementById('verifyBadge').style.display=u.is_verified?'inline-flex':'none';
    const av=document.getElementById('sidebarAvatar');
    if(u.profile_photo_url) av.innerHTML=`<img src="${u.profile_photo_url}" alt="">`;
    else av.textContent=(u.full_name||'U').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    await loadCounts(); lucide.createIcons();
}

async function loadCounts(){
    const [svc,ord]=await Promise.all([
        sb.from('services').select('id',{count:'exact',head:true}).eq('user_id',currentUser.id),
        sb.from('orders').select('id',{count:'exact',head:true}).eq('provider_id',currentUser.id).in('status',['pending','confirmed','in_progress'])
    ]);
    document.getElementById('serviceBadge').textContent=svc.count||0;
    document.getElementById('orderBadge').textContent=ord.count||0;
}

async function getMyServices(){
    if(!currentUser) return[];
    const {data,error}=await sb.from('services').select('*').eq('user_id',currentUser.id).order('created_at',{ascending:false});
    return error?[]:data||[];
}

function renderServices(){
    const c=document.getElementById('servicesTable');
    if(!services.length){
        c.innerHTML=`<div class="empty-state"><div class="empty-icon"><i data-lucide="package" style="width:3rem;height:3rem"></i></div><h3>Aucun service créé</h3><p>Créez votre premier service pour commencer à recevoir des commandes.</p>
        <a href="service-registration.html" class="btn btn-primary"><i data-lucide="plus"></i> Créer un service</a></div>`;
        lucide.createIcons(); return;
    }
    const icons={'Plomberie':'wrench','Électricité':'zap','Ménage':'home','Photographie':'camera','Développement web':'monitor','Cours particuliers':'book-open','Transport':'car','Design':'palette','Beauté':'sparkles','Bâtiment':'hard-hat'};
    const types={fixed:"Prix fixe",hourly:"À l'heure",daily:'À la journée',project:'Par projet'};
    c.innerHTML=`<table><thead><tr><th>Service</th><th>Catégorie</th><th>Type de prix</th><th>Prix</th><th>Statut</th><th>Créé le</th><th>Actions</th></tr></thead><tbody>${services.map(s=>`<tr>
        <td><div class="service-cell"><div class="service-icon"><i data-lucide="${icons[s.category]||'briefcase'}" style="width:1.25rem;height:1.25rem"></i></div><div><strong>${esc(s.title)}</strong><div class="service-desc-preview">${esc((s.description||'').substring(0,60))}${s.description&&s.description.length>60?'...':''}</div></div></div></td>
        <td><span class="category-tag">${esc(s.category)}</span></td>
        <td>${types[s.pricing_type]||s.pricing_type}</td>
        <td class="price-cell">${formatPrice(s.price)}</td>
        <td><span class="status-badge ${s.is_active?'status-active':'status-inactive'}">${s.is_active?'Actif':'Inactif'}</span></td>
        <td>${formatDate(s.created_at)}</td>
        <td><div style="display:flex;gap:4px">
            <a href="service-registration.html?id=${s.id}" class="btn-icon" title="Modifier"><i data-lucide="pencil" style="width:.875rem;height:.875rem"></i></a>
            <button class="btn-icon warning" onclick="toggleStatus('${s.id}')" title="${s.is_active?'Désactiver':'Activer'}"><i data-lucide="${s.is_active?'eye-off':'eye'}" style="width:.875rem;height:.875rem"></i></button>
            <button class="btn-icon danger" onclick="deleteService('${s.id}')" title="Supprimer"><i data-lucide="trash-2" style="width:.875rem;height:.875rem"></i></button>
        </div></td>
    </tr>`).join('')}</tbody></table>`;
    lucide.createIcons();
}

async function openServiceModal(id=null){
    const isEdit=!!id;
    let s={title:'',category:'Plomberie',price:'',pricing_type:'fixed',description:'',duration_minutes:'',is_active:true,image_url:''};
    if(isEdit){ const f=services.find(x=>x.id===id); if(f) s={...s,...f}; }
    const cats=['Plomberie','Électricité','Ménage','Photographie','Développement web','Cours particuliers','Transport','Design','Beauté','Bâtiment'];
    
    const overlay=document.createElement('div'); overlay.className='modal-overlay';
    overlay.onclick=e=>{ if(e.target===overlay) overlay.remove(); };
    overlay.innerHTML=`<div class="modal">
        <div class="modal-header"><h3 class="modal-title"><i data-lucide="${isEdit?'pencil':'plus'}" style="color:var(--primary);width:1.25rem;height:1.25rem"></i> ${isEdit?'Modifier':'Nouveau'} service</h3><button class="modal-close" onclick="this.closest('.modal-overlay').remove()"><i data-lucide="x"></i></button></div>
        <form id="sf">
            <div class="form-group"><label>Titre *</label><input name="title" value="${esc(s.title)}" placeholder="Ex: Plombier professionnel" required></div>
            <div class="form-row">
                <div class="form-group"><label>Catégorie *</label><select name="category">${cats.map(c=>`<option value="${c}" ${s.category===c?'selected':''}>${c}</option>`).join('')}</select></div>
                <div class="form-group"><label>Type de prix *</label><select name="pricing_type" id="pt"><option value="fixed" ${s.pricing_type==='fixed'?'selected':''}>Prix fixe</option><option value="hourly" ${s.pricing_type==='hourly'?'selected':''}>Taux horaire</option><option value="daily" ${s.pricing_type==='daily'?'selected':''}>Taux journalier</option><option value="project" ${s.pricing_type==='project'?'selected':''}>Par projet</option></select></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Prix (FCFA) *</label><input type="number" name="price" value="${s.price}" placeholder="15000" required min="100"></div>
                <div class="form-group" id="dg" style="display:${['hourly','daily'].includes(s.pricing_type)?'block':'none'}"><label>Durée estimée (Heures)</label><input type="number" name="duration_minutes" value="${s.duration_minutes||''}" placeholder="60" min="15" step="15"></div>
            </div>
            <div class="form-group"><label>Description</label><textarea name="description" rows="3">${esc(s.description||'')}</textarea></div>
            <div class="form-group"><label>URL image</label><input type="url" name="image_url" value="${esc(s.image_url||'')}" placeholder="https://..."></div>
            <div class="form-actions"><button type="button" class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">Annuler</button><button type="submit" class="btn btn-primary"><i data-lucide="${isEdit?'save':'plus'}"></i> ${isEdit?'Enregistrer':'Créer'}</button></div>
        </form>
    </div>`;
    document.body.appendChild(overlay); lucide.createIcons();
    document.getElementById('pt').addEventListener('change',function(){ document.getElementById('dg').style.display=['hourly','daily'].includes(this.value)?'block':'none'; });
    
    document.getElementById('sf').addEventListener('submit',async function(e){
        e.preventDefault();
        const fd=new FormData(this), data=Object.fromEntries(fd.entries());
        data.price=parseFloat(data.price); data.title=data.title.trim();
        data.description=data.description.trim()||null; data.image_url=data.image_url.trim()||null;
        data.duration_minutes=data.duration_minutes?parseInt(data.duration_minutes):null;
        if(!['hourly','daily'].includes(data.pricing_type)) data.duration_minutes=null;
        try{
            if(isEdit){ await sb.from('services').update(data).eq('id',id); showToast('Service mis à jour','success'); }
            else { data.user_id=currentUser.id; await sb.from('services').insert([data]); showToast('Service créé','success'); }
            overlay.remove(); services=await getMyServices(); renderServices(); await loadCounts();
        }catch(err){ showToast('Erreur: '+err.message,'error'); }
    });
}

async function toggleStatus(id){
    const s=services.find(x=>x.id===id); if(!s) return;
    await sb.from('services').update({is_active:!s.is_active}).eq('id',id);
    services=await getMyServices(); renderServices(); await loadCounts();
    showToast(s.is_active?'Service désactivé':'Service activé','info');
}

async function deleteService(id){
    if(!await confirmAction('Supprimer définitivement ce service ?')) return;
    await sb.from('services').delete().eq('id',id);
    services=await getMyServices(); renderServices(); await loadCounts();
    showToast('Service supprimé','info');
}

async function loadServices(){
    await initDashboard();
    services=await getMyServices();
    renderServices();
}

loadServices();
</script>
</body>
</html>
